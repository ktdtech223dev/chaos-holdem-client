function setVolume(v){
  volLevel=v/100;
  if(masterGain&&audioCtx)masterGain.gain.setTargetAtTime(volLevel,audioCtx.currentTime,0.05);
  if(_radioAudio)_radioAudio.volume=volLevel;
  // Persist volume
  try{localStorage.setItem('chaosVolume',v);}catch(e){}
}
function toggleMusic(){initAudio();if(musicPlaying)stopMusic();else playTrack(currentTrackIdx);}
function stopMusic(){
  if(currentTrackNode){try{if(typeof currentTrackNode.stop==='function')currentTrackNode.stop();}catch(e){}currentTrackNode=null;}
  if(musicGain){musicGain.gain.cancelScheduledValues(audioCtx.currentTime);musicGain.gain.setTargetAtTime(0,audioCtx.currentTime,0.08);}
  musicPlaying=false; let pb=document.getElementById('play-btn'); if(pb)pb.textContent='▶';
}
function prevTrack(){initAudio();currentTrackIdx=(currentTrackIdx-1+TRACKS.length)%TRACKS.length;if(musicPlaying){stopMusic();playTrack(currentTrackIdx);}else updateTrackDisplay();}
function nextTrack(){initAudio();currentTrackIdx=(currentTrackIdx+1)%TRACKS.length;if(musicPlaying){stopMusic();playTrack(currentTrackIdx);}else updateTrackDisplay();}
function updateTrackDisplay(){
  let t=TRACKS[currentTrackIdx];
  let tn=document.getElementById('track-name');
  let tv=document.getElementById('track-vibe');
  let pb=document.getElementById('play-btn');
  let live=document.getElementById('live-badge');
  if(tn)tn.textContent=t.name;
  if(tv)tv.textContent=t.vibe+(t.genre?' · '+t.genre:'');
  if(pb)pb.textContent=musicPlaying?'⏸':'▶';
  if(live)live.style.display=musicPlaying?'inline-block':'none';
}
function playTrack(idx){
  stopMusic();
  let t=TRACKS[idx];
  if(t.type==='radio'){
    // Stream via <audio> element
    let audio=getRadioAudio();
    audio.src=t.url;
    audio.volume=volLevel;
    audio.play().catch(e=>log('Radio blocked: '+e.message,'bad'));
    currentTrackNode={stop:()=>{audio.pause();audio.src='';},isRadio:true};
    musicPlaying=true;
    updateTrackDisplay();
  }else{
    // Web Audio synth
    setTimeout(()=>{
      if(musicGain){musicGain.gain.cancelScheduledValues(audioCtx.currentTime);musicGain.gain.setTargetAtTime(0.5,audioCtx.currentTime,0.12);}
      musicPlaying=true; currentTrackNode=t.fn(); updateTrackDisplay();
    },150);
  }
}

// Helpers
function mn(n){return 440*Math.pow(2,(n-69)/12);}
function osc(type,freq,start,dur,vol,dest,det){
  if(!audioCtx||dur<=0)return;
  det=det||0;
  let o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq; if(det)o.detune.value=det;
  let atk=Math.min(0.015,dur*0.08);
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+atk);
  g.gain.setValueAtTime(vol*0.85,start+dur-Math.min(0.05,dur*0.25));
  g.gain.linearRampToValueAtTime(0,start+dur);
  o.connect(g);g.connect(dest);
  try{o.start(start);o.stop(start+dur+0.02);}catch(e){}
}
function noise(start,dur,vol,dest,lp){
  if(!audioCtx||dur<=0)return;
  lp=lp||800;
  let samples=Math.max(1,Math.ceil(audioCtx.sampleRate*dur));
  let buf=audioCtx.createBuffer(1,samples,audioCtx.sampleRate);
  let d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  let src=audioCtx.createBufferSource(); src.buffer=buf;
  let f=audioCtx.createBiquadFilter(); f.type='lowpass';f.frequency.value=lp;
  let g=audioCtx.createGain(); g.gain.setValueAtTime(vol,start); g.gain.linearRampToValueAtTime(0,start+dur);
  src.connect(f);f.connect(g);g.connect(dest);
  try{src.start(start);}catch(e){} return src;
}
function kk(t,f,vol){
  if(!audioCtx)return;
  let kg=audioCtx.createGain(); kg.gain.setValueAtTime(vol,t); kg.gain.exponentialRampToValueAtTime(0.001,t+0.32); kg.connect(musicGain);
  let ko=audioCtx.createOscillator(); ko.type='sine'; ko.frequency.setValueAtTime(f,t); ko.frequency.exponentialRampToValueAtTime(36,t+0.25);
  ko.connect(kg); try{ko.start(t);ko.stop(t+0.38);}catch(e){}
}

// ============================================================
// TRACK 1: "VELVET SHUFFLE" — Lush swing jazz, E♭. Walking bass,
// swung ride, comping chords, bright melody. Think casino lounge.
// ============================================================
function buildTrackVelvet(){
  let loop={stopped:false,nodes:[]};
  let bpm=140,beat=60/bpm,sw=beat*0.67;
  // E♭ major: Cm7-F7-B♭maj7-E♭maj7
  let prog=[{r:60,v:[0,3,7,10]},{r:53,v:[0,4,7,10]},{r:58,v:[0,4,7,11]},{r:63,v:[0,4,7,11]}];
  let bass=[[60,62,63,65],[53,55,56,58],[58,57,55,53],[63,62,60,58]];
  let mel=[[75,74,72,70,72,74,75,74],[70,72,74,75,74,72,70,69],[75,77,79,77,75,74,75,72],[70,72,74,75,77,75,74,72]];

  function bar(t,b){
    if(loop.stopped)return;
    let ci=b%prog.length,ch=prog[ci],bw=bass[ci],ml=mel[ci];
    // Bass (piano-ish: triangle + slight decay)
    bw.forEach((n,i)=>{osc('triangle',mn(n-12),t+i*beat,beat*0.82,0.38,musicGain);});
    // Kick 1 and ghost 3
    kk(t,125,0.44); kk(t+2*beat+sw*0.4,95,0.22);
    // Snare 2,4
    [beat,3*beat].forEach(of=>{noise(t+of,0.1,0.22,musicGain,5500);noise(t+of,0.04,0.09,musicGain,13000);osc('triangle',195,t+of,0.04,0.1,musicGain);});
    // Swung ride
    [0,sw,beat,beat+sw,2*beat,2*beat+sw,3*beat,3*beat+sw].forEach((of,i)=>{noise(t+of,0.045,(i%2===0)?0.06:0.03,musicGain,16000);osc('sine',6200+i*180,t+of,0.022,0.005,musicGain);});
    // Hi-hat accents 2,4
    [beat,3*beat].forEach(of=>noise(t+of,0.07,0.1,musicGain,9500));
    // Comping: beat 2 and and-of-3
    [beat,2*beat+sw].forEach(of=>ch.v.forEach(iv=>{osc('triangle',mn(ch.r+iv),t+of,beat*0.28,0.038,musicGain);osc('sine',mn(ch.r+iv+12),t+of,beat*0.22,0.016,musicGain);}));
    // Melody (piano sine with decay)
    let mt=[0.05,0.55,1.08,1.62,2.2,2.7,3.2,3.68].map(x=>x*beat);
    ml.forEach((n,i)=>{if(i>=mt.length||Math.random()>0.82)return;osc('sine',mn(n+12),t+mt[i],beat*0.38,0.072,musicGain);if(Math.random()>0.6)osc('sine',mn(n+12-3),t+mt[i],beat*0.3,0.024,musicGain);});
    let tid=setTimeout(()=>bar(t+4*beat,b+1),(4*beat-0.1)*1000); loop.nodes.push(tid);
  }
  bar(audioCtx.currentTime+0.05,0);
  loop.stop=()=>{loop.stopped=true;loop.nodes.forEach(clearTimeout);}; return loop;
}

// ============================================================
// TRACK 2: "NEON DEALER" — Dark electro. Am-F-C-G.
// Pulsing synth bass, gated pad, driving beat, minor melody.
// ============================================================
function buildTrackNeon(){
  let loop={stopped:false,nodes:[]};
  let bpm=116,beat=60/bpm;
  let prog=[{r:57,ch:[0,3,7]},{r:53,ch:[0,4,7]},{r:48,ch:[0,4,7]},{r:55,ch:[0,4,7]}];
  let motif=[[69,72,69,67,65,67,69,67],[65,67,69,70,69,67,65,64],[64,65,67,69,72,70,69,67],[67,69,72,74,72,69,67,65]];

  function bar(t,b){
    if(loop.stopped)return;
    let cd=prog[b%prog.length],ml=motif[b%motif.length];
    // Synth bass pulse — 8th notes
    for(let i=0;i<8;i++){
      let v=(i%2===0)?0.32:0.18;
      osc('sawtooth',mn(cd.r-12),t+i*beat/2,beat/2*0.8,v*0.55,musicGain);
      osc('sine',mn(cd.r-12),t+i*beat/2,beat/2*0.8,v*0.38,musicGain);
    }
    // 4-on-floor kick
    for(let k=0;k<4;k++) kk(t+k*beat,k===0?155:125,k===0?0.56:0.42);
    // Clap 2,4
    [beat,3*beat].forEach(of=>{noise(t+of,0.08,0.32,musicGain,8500);noise(t+of,0.035,0.14,musicGain,16000);});
    // 16th hi-hat
    for(let h=0;h<16;h++) noise(t+h*beat/4,0.02,h%4===0?0.055:0.025,musicGain,13000);
    // Open hat crash every 4 bars
    if(b%4===3) noise(t+3.75*beat,0.2,0.14,musicGain,16000);
    // Gated pad chords (whole bar, slight swell)
    cd.ch.forEach(iv=>{osc('sawtooth',mn(cd.r+iv+12),t,beat*4*0.94,0.032,musicGain,-12);osc('sawtooth',mn(cd.r+iv+12),t,beat*4*0.94,0.028,musicGain,12);});
    // Lead
    let mt=[0,0.5,1,1.5,2.25,2.75,3,3.5].map(x=>x*beat);
    ml.forEach((n,i)=>{if(i>=mt.length)return;osc('sawtooth',mn(n),t+mt[i],beat*0.36,0.06,musicGain,6);osc('square',mn(n),t+mt[i],beat*0.3,0.02,musicGain,-6);});
    let tid=setTimeout(()=>bar(t+4*beat,b+1),(4*beat-0.1)*1000); loop.nodes.push(tid);
  }
  bar(audioCtx.currentTime+0.05,0);
  loop.stop=()=>{loop.stopped=true;loop.nodes.forEach(clearTimeout);}; return loop;
}

// ============================================================
// TRACK 3: "FULL TILT" — Cinematic action. Dm-Bb-C-Dm.
// Heavy orchestra stabs, taiko-style drums, tense strings ostinato.
// ============================================================
function buildTrackFullTilt(){
  let loop={stopped:false,nodes:[]};
  let bpm=104,beat=60/bpm;
  let prog=[{r:62,ch:[0,3,7]},{r:58,ch:[0,4,7]},{r:60,ch:[0,4,7]},{r:62,ch:[0,3,7]}];
  let ostinato=[62,65,67,69,67,65,62,60]; // Dm rising/falling

  function bar(t,b){
    if(loop.stopped)return;
    let cd=prog[b%prog.length];
    // Heavy kick on 1, 2.5ish (habanera-ish feel)
    kk(t,170,0.65); kk(t+2.5*beat,130,0.48);
    // Snare accents
    [1.5,3].map(of=>{noise(t+of*beat,0.11,0.35,musicGain,7000);noise(t+of*beat,0.04,0.14,musicGain,16000);osc('triangle',180,t+of*beat,0.06,0.12,musicGain);});
    // 8th hi-hat
    for(let h=0;h<8;h++) noise(t+h*beat/2,0.03,(h%2===0)?0.06:0.03,musicGain,14000);
    // Orchestra brass stabs on 1 and 3
    [0,2*beat].forEach(of=>cd.ch.forEach(iv=>{osc('sawtooth',mn(cd.r+iv+12),t+of,beat*0.4,0.055,musicGain,-8);osc('sawtooth',mn(cd.r+iv+12),t+of,beat*0.4,0.048,musicGain,8);osc('square',mn(cd.r+iv),t+of,beat*0.35,0.025,musicGain);}));
    // Strings ostinato — 8th notes
    ostinato.forEach((n,i)=>{osc('sawtooth',mn(n+12),t+i*beat/2,beat/2*0.75,0.028,musicGain,-6);osc('sawtooth',mn(n+12),t+i*beat/2,beat/2*0.75,0.022,musicGain,6);});
    // Taiko low rumble on 1
    osc('sine',mn(62-24),t,beat*1.5,0.32,musicGain);
    // Rising tension line
    if(b%2===1){let rise=[62,64,65,67];rise.forEach((n,i)=>osc('triangle',mn(n+12),t+i*beat,beat*0.9,0.042,musicGain));}
    let tid=setTimeout(()=>bar(t+4*beat,b+1),(4*beat-0.1)*1000); loop.nodes.push(tid);
  }
  bar(audioCtx.currentTime+0.05,0);
  loop.stop=()=>{loop.stopped=true;loop.nodes.forEach(clearTimeout);}; return loop;
}

// TRACK 4: "CASINO FLOOR" — Latin jazz. Cm-Fm-G7-Cm.
// Clave rhythm, montuno piano pattern, upright bass, bright horn.
// ============================================================
function buildTrackCasino(){
  let loop={stopped:false,nodes:[]};
  let bpm=128,beat=60/bpm;
  // Cm-Fm-G7-Cm
  let prog=[{r:60,v:[0,3,7,10]},{r:65,v:[0,3,7,10]},{r:55,v:[0,4,7,10]},{r:60,v:[0,3,7,10]}];
  let bass=[[60,62,63,65],[65,63,62,60],[55,57,58,60],[60,58,57,55]];
  // Montuno-ish melody
  let mel=[[75,72,75,72,75,74,72,70],[72,70,72,70,72,70,68,67],[77,75,74,72,70,72,74,75],[75,74,72,70,69,67,65,64]];
  // 2-3 son clave: 1,2.5,4 + 5.5,7 (in 8th note positions)
  let clave=[0,2,4,6.5,8].map(x=>x*beat/4);

  function bar(t,b){
    if(loop.stopped)return;
    let ci=b%prog.length,ch=prog[ci],bw=bass[ci],ml=mel[ci];
    // Clave (wood block-ish)
    clave.forEach(of=>noise(t+of,0.04,0.14,musicGain,5000));
    // Tumbao bass — upright feel
    bw.forEach((n,i)=>{osc('triangle',mn(n-12),t+i*beat,beat*0.85,0.42,musicGain);osc('sine',mn(n-24),t+i*beat,beat*0.7,0.16,musicGain);});
    // Kick on 1 and 3 (lighter, latin)
    kk(t,110,0.38); kk(t+2*beat,95,0.3);
    // Snare cross-stick on 2,4
    [beat,3*beat].forEach(of=>{noise(t+of,0.07,0.16,musicGain,3000);osc('triangle',700,t+of,0.04,0.08,musicGain);});
    // Congas (mid-high noise bursts on off-beats)
    [0.5,1.5,2.5,3.5].map(of=>noise(t+of*beat,0.05,0.08,musicGain,4000));
    // Montuno piano chords (16th-note anticipations)
    [0,0.25,1,1.5,2,2.25,3,3.5].forEach((of,i)=>{
      ch.v.slice(0,3).forEach(iv=>{osc('triangle',mn(ch.r+iv+(i%2===0?12:0)),t+of*beat,beat*0.18,0.042,musicGain);});
    });
    // Bright horn melody
    let mt=[0.05,0.5,1.0,1.5,2.05,2.55,3.0,3.5].map(x=>x*beat);
    ml.forEach((n,i)=>{if(i>=mt.length||Math.random()>0.82)return;osc('sawtooth',mn(n+12),t+mt[i],beat*0.38,0.055,musicGain,-5);osc('sine',mn(n+12),t+mt[i],beat*0.3,0.025,musicGain);});
    let tid=setTimeout(()=>bar(t+4*beat,b+1),(4*beat-0.1)*1000); loop.nodes.push(tid);
  }
  bar(audioCtx.currentTime+0.05,0);
  loop.stop=()=>{loop.stopped=true;loop.nodes.forEach(clearTimeout);}; return loop;
}

// TRACK: "DEAD MAN'S BET" — Slow noir. Em-Am-Dm-G. 90bpm.
// Sparse Rhodes-style piano, upright bass walk, brushed snare.
// Dark and cinematic — tension without aggression.
// ============================================================
function buildTrackDeadMans(){
  let loop={stopped:false,nodes:[]};
  let bpm=90,beat=60/bpm;
  let prog=[{r:64,ch:[0,3,7,10]},{r:69,ch:[0,3,7,10]},{r:62,ch:[0,3,7,10]},{r:67,ch:[0,4,7,10]}];
  let bassLines=[[64,67,69,71],[69,71,72,71],[62,64,65,67],[67,69,71,72]];
  let melNotes=[[76,74,72,71,72,74,76,74],[72,74,76,77,76,74,72,71],[71,72,74,76,77,76,74,72],[74,76,77,79,77,76,74,72]];

  function bar(t,b){
    if(loop.stopped)return;
    let cd=prog[b%4],bl=bassLines[b%4],ml=melNotes[b%4];
    // Sparse brushed kick (just low thud)
    let kg=audioCtx.createGain();kg.gain.setValueAtTime(0.28,t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.5);kg.connect(musicGain);
    let ko=audioCtx.createOscillator();ko.type='sine';ko.frequency.setValueAtTime(80,t);ko.frequency.exponentialRampToValueAtTime(40,t+0.4);ko.connect(kg);try{ko.start(t);ko.stop(t+0.55);}catch(e){}
    // Brushed snare on 2 and 4
    [beat,3*beat].forEach(of=>{noise(t+of,0.18,0.12,musicGain,3500);noise(t+of,0.06,0.05,musicGain,9000);});
    // Light hi-hat pattern
    for(let h=0;h<8;h++){let v=h%2===0?0.04:0.02;noise(t+h*beat/2,0.03,v,musicGain,14000);}
    // Upright bass — triangle wave for warmth
    bl.forEach((n,i)=>{osc('triangle',mn(n-12),t+i*beat,beat*0.8,0.35,musicGain);osc('sine',mn(n-24),t+i*beat,beat*0.6,0.1,musicGain);});
    // Rhodes-style chord stabs (2 and 4, short and decayed)
    [beat,3*beat].forEach(of=>{cd.ch.forEach(iv=>{osc('triangle',mn(cd.r+iv),t+of,beat*0.3,0.055,musicGain);osc('sine',mn(cd.r+iv+12),t+of,beat*0.25,0.025,musicGain);});});
    // Sparse melody — only every other bar
    if(b%2===0){
      let mt=[0.1,0.75,1.4,2.1,2.8,3.4,3.75].map(x=>x*beat);
      ml.forEach((n,i)=>{if(i>=mt.length||Math.random()>0.7)return;osc('sine',mn(n),t+mt[i],beat*0.5,0.06,musicGain);osc('triangle',mn(n),t+mt[i],beat*0.4,0.025,musicGain);});
    }
    // Sub bass rumble
    osc('sine',mn(cd.r-24),t,beat*4*0.9,0.12,musicGain);
    let tid=setTimeout(()=>bar(t+4*beat,b+1),(4*beat-0.1)*1000);loop.nodes.push(tid);
  }
  bar(audioCtx.currentTime+0.05,0);
  loop.stop=()=>{loop.stopped=true;loop.nodes.forEach(clearTimeout);};return loop;
}

// ============================================================
// TRACK: "HOUSE EDGE" — Minimal techno. 122bpm. Fm-Cm-Ab-Eb.
// Four-on-floor kick, clicky hi-hats, acid bassline, synth arp.
// Propulsive and mechanical — the casino never sleeps.
// ============================================================
function buildTrackHouseEdge(){
  let loop={stopped:false,nodes:[]};
  let bpm=122,beat=60/bpm;
  let prog=[{r:65,ch:[0,3,7]},{r:60,ch:[0,3,7]},{r:68,ch:[0,4,7]},{r:63,ch:[0,4,7]}];
  // Acid bassline pattern (303-style)
  let acidPat=[[0,0.5,0.75,1,1.5,2,2.5,3,3.25,3.5].map(x=>x*beat),
               [0,0.25,0.75,1.25,1.75,2,2.5,3,3.75].map(x=>x*beat)];
  let arpPat=[0,3,7,10,12,10,7,3];

  function bar(t,b){
    if(loop.stopped)return;
    let cd=prog[b%4];
    // 4-on-floor kick
    for(let k=0;k<4;k++){
      let kg=audioCtx.createGain();kg.gain.setValueAtTime(0.55,t+k*beat);kg.gain.exponentialRampToValueAtTime(0.001,t+k*beat+0.35);kg.connect(musicGain);
      let ko=audioCtx.createOscillator();ko.type='sine';ko.frequency.setValueAtTime(k===0?160:130,t+k*beat);ko.frequency.exponentialRampToValueAtTime(38,t+k*beat+0.28);ko.connect(kg);try{ko.start(t+k*beat);ko.stop(t+k*beat+0.4);}catch(e){}
    }
    // Clicky 16th hi-hats
    for(let h=0;h<16;h++){let open=h%8===6;noise(t+h*beat/4,open?0.12:0.025,open?0.09:0.04,musicGain,open?12000:16000);}
    // Clap on 2 and 4
    [beat,3*beat].forEach(of=>{noise(t+of,0.06,0.25,musicGain,7000);noise(t+of,0.03,0.1,musicGain,14000);});
    // Acid bass (sawtooth, short decayed notes)
    let pat=acidPat[b%2];
    pat.forEach((ot,i)=>{
      let note=cd.r-12+(i%3===0?0:i%3===1?3:7);
      osc('sawtooth',mn(note),t+ot,beat*0.18,0.28,musicGain);
      osc('sawtooth',mn(note),t+ot,beat*0.12,0.15,musicGain,8); // slight detune
    });
    // Sub bass (sine, whole bar)
    osc('sine',mn(cd.r-24),t,beat*4*0.95,0.2,musicGain);
    // Synth arp (every 2 bars)
    if(b%2===0){
      arpPat.forEach((iv,i)=>{osc('square',mn(cd.r+iv+12),t+i*beat/2,beat/2*0.4,0.045,musicGain,-5);osc('square',mn(cd.r+iv+12),t+i*beat/2,beat/2*0.35,0.03,musicGain,5);});
    }
    // Pad (whole bar, low volume)
    cd.ch.forEach(iv=>{osc('sawtooth',mn(cd.r+iv+12),t,beat*4*0.9,0.018,musicGain,-10);osc('sawtooth',mn(cd.r+iv+12),t,beat*4*0.9,0.015,musicGain,10);});
    let tid=setTimeout(()=>bar(t+4*beat,b+1),(4*beat-0.1)*1000);loop.nodes.push(tid);
  }
  bar(audioCtx.currentTime+0.05,0);
  loop.stop=()=>{loop.stopped=true;loop.nodes.forEach(clearTimeout);};return loop;
}

// SFX
// ============================================================
function sfx(type){
  if(!audioCtx)return;
  let t=audioCtx.currentTime;
  switch(type){
    case 'check':[0,0.11].forEach(dt=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=920;g.gain.setValueAtTime(0.16,t+dt);g.gain.linearRampToValueAtTime(0,t+dt+0.07);o.connect(g);g.connect(sfxGain);o.start(t+dt);o.stop(t+dt+0.1);});break;

// v0.6 SERVER API
// Replace CHAOS_SERVER_URL with your Railway URL once deployed.
// All calls gracefully fail offline — game always works without server.
// ════════════════════════════════════════════════════════════
const CHAOS_SERVER_URL = 'https://chaos-holdem-server3-production.up.railway.app';
const NGAMES_SERVER_URL = 'https://ngames-server-production.up.railway.app'; // N Games Network server

function serverAvailable(){
  return CHAOS_SERVER_URL && CHAOS_SERVER_URL !== 'PASTE_RAILWAY_URL_HERE';
}

async function apiGet(path){
  if(!serverAvailable()) return null;
  try{
    let r = await fetch(CHAOS_SERVER_URL + path, {signal: AbortSignal.timeout(5000)});
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

async function apiPost(path, body){
  if(!serverAvailable()) return null;
  try{
    let r = await fetch(CHAOS_SERVER_URL + path, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(5000)
    });
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

// Sync profile data to server (XP, playtime, achievements)
async function syncProfileToServer(profileId){
  if(!serverAvailable()) return;
  let pd = loadPD();
  let ingameDelta = _lastIngameSyncSecs || 0;
  let afkDelta = _lastAfkSyncSecs || 0;
  _lastIngameSyncSecs = 0;
  _lastAfkSyncSecs = 0;
  await apiPost('/profile/sync', {
    profile_id: profileId,
    xp_total: pd.xpTotal || 0,
    xp_level: pd.xpLevel || 1,
    achievements: pd.achievements || {},
    playtime_ingame_secs: ingameDelta,
    playtime_afk_secs: afkDelta,
  });
}

// Submit a completed run to server
async function submitRunToServer(profileId, runData){
  if(!serverAvailable()) return null;
  return await apiPost('/run/submit', {
    profile_id: profileId,
    ...runData
  });
}

// Fetch activity feed
async function fetchFeed(since){
  return await apiGet('/feed' + (since ? '?since='+since : ''));
}

// Fetch all profiles for Friends tab
async function fetchAllProfiles(){
  return await apiGet('/profiles');
}

// Fetch last N runs for a profile
async function fetchPlayerRuns(profileId, limit){
  return await apiGet('/runs/'+profileId+'?limit='+(limit||5));
}

// Fetch dev insights
async function fetchDevInsights(){
  return await apiGet('/dev/insights');
}

// PRESENCE SYSTEM + STATIC FRIENDS SIDEBAR — v0.6.8
// ════════════════════════════════════════════════════════════
let _presenceInterval = null;

async function presencePing(status){
  if(!serverAvailable()) return;
  let ap = getActiveProfile();
  if(!ap) return;
  let payload = {
    profile_id: ap.id, status: status,
    game: 'chaos-holdem', version: CURRENT_VERSION,
    game_state: 'in_menu',
    run_hand: 0, run_chips: 0, run_score: 0,
    run_bosses: 0, run_hardcore: false
  };
  // If mid-run, include run details
  if(typeof G !== 'undefined' && G.round > 0 && !G.isBustScreen){
    let sc = 0;
    try{ sc = calculateScore().total; }catch(e){}
    payload.game_state = G.isBossFight ? 'in_boss'
      : (G.isShopTime ? 'in_shop' : 'in_run');
    payload.run_hand = G.round || 0;
    payload.run_chips = G.chips || 0;
    payload.run_score = sc;
    payload.run_bosses = (G.bossesDefeated||[]).length;
    payload.run_hardcore = G.hardcore || false;
  }
  await apiPost('/presence/ping', payload);
}

function startPresence(){
  presencePing('online');
  if(_presenceInterval) clearInterval(_presenceInterval);
  _presenceInterval = setInterval(()=>presencePing('online'), 4*60*1000);
}

function stopPresence(){
  if(_presenceInterval){ clearInterval(_presenceInterval); _presenceInterval=null; }
  presencePing('offline');
}
function startRunPresence(){
  // Ping every 15s during active run to keep hand/chip count fresh for crew
  if(_presenceInterval) clearInterval(_presenceInterval);
  _presenceInterval=setInterval(()=>presencePing('online'),15*1000);
  presencePing('online');
}
function stopRunPresence(){
  // Back to 60s ping on menu
  if(_presenceInterval) clearInterval(_presenceInterval);
  _presenceInterval=setInterval(()=>presencePing('online'),60*1000);
}

// ── PRESENCE DOTS — surgical DOM update, runs every 15s ──────
async function refreshPresenceDots(){
  let list = document.getElementById('friend-sidebar-list');
  if(!list) return;
  let ap = getActiveProfile();
  let profiles = await fetchAllProfiles();
  // Server offline — render with empty profiles so sidebar still shows crew names
  if(!profiles) profiles = CREW_PROFILES.map(function(cp){
    return {id:cp.id, display_name:cp.name, current_status:'offline',
            best_score:0, xp_level:1, last_seen:0, last_seen_label:'never'};
  });

  // If empty, do full render with IDs
  if(!list.querySelector('[id^="presence-dot-"]')){
    list.innerHTML = buildSidebarRows(profiles, ap);
    // Seed known statuses on first render (no toasts)
    for(let cp of CREW_PROFILES){
      let sp = profiles.find(function(p){ return p.id===cp.id; });
      if(ap?.id !== cp.id){
        _lastKnownStatuses[cp.id] = sp?.current_status==='online' ? 'online' : 'offline';
      }
    }
    return;
  }

  // Surgical update — only dots and status text
  for(let cp of CREW_PROFILES){
    let sp = profiles.find(function(p){ return p.id===cp.id; });
    let isMe = ap?.id===cp.id;
    let isOnline;
    if(isMe){ isOnline=true; }
    else if(!sp){ isOnline=false; }
    else {
      let staleMs=5*60*1000;
      let lastSeenMs=(sp.last_seen||0)*1000;
      let isStale=lastSeenMs>0&&(Date.now()-lastSeenMs)>staleMs;
      isOnline=sp.current_status==='online'&&!isStale;
    }

    // Toast on status change
    if(!isMe && _lastKnownStatuses[cp.id] !== undefined){
      let wasOnline = _lastKnownStatuses[cp.id]==='online';
      if(isOnline && !wasOnline) showPresenceToast(cp,'online');
      else if(!isOnline && wasOnline) showPresenceToast(cp,'offline');
    }
    if(!isMe) _lastKnownStatuses[cp.id] = isOnline ? 'online' : 'offline';

    let dot = document.getElementById('presence-dot-'+cp.id);
    let statusEl = document.getElementById('presence-status-'+cp.id);
    if(dot){ dot.style.background=isOnline?'#27ae60':'#444'; dot.style.transition='background 0.4s ease'; }
    if(statusEl){
      statusEl.textContent = isMe
        ? (isOnline?'You · Online':'You · Offline')
        : (isOnline ? getRichPresenceText(sp) : 'Last seen '+(sanitizeLastSeen(sp?.last_seen_label)));
      statusEl.style.color = isOnline ? 'var(--green2)' : 'rgba(255,255,255,0.22)';
    }
  }
}

    let bestScore = sp?.best_score || 0;

function getRichPresenceText(sp){
  if(!sp) return 'Online now';
  var state=sp.game_state||'in_menu';
  var gm=sp.current_game||sp.game_mode||null;
  var labels={poker:"Hold'Em",blackjack:"Blackjack",slots:"Slots",crash:"Crash",roulette:"Roulette"};
  var ml=gm&&labels[gm]?' · '+labels[gm]:'';
  if(state==='in_game'||state==='in_run') return 'Playing'+ml+(sp.run_hand?' · Rd '+sp.run_hand:'');
  if(state==='in_shop') return 'Shopping'+ml;
  if(state==='in_boss') return 'Boss fight'+ml;
  if(state==='in_menu'){
    if(ml) return 'In menu'+ml;
    var idle=Date.now()/1000-(sp.last_seen||0);
    return idle>600?'Hitting the Amari':'In menu';
  }
  return 'Online'+ml;
}

// PRESENCE TOAST NOTIFICATIONS
// ════════════════════════════════════════════════════════════
let _lastKnownStatuses = {}; // {profile_id: 'online'|'offline'}
let _toastQueue = [];
let _toastShowing = false;

function showPresenceToast(cp, status){
  let msg = status === 'online'
    ? cp.name + ' is now online'
    : cp.name + ' went offline';
  let icon = status === 'online' ? '🟢' : '⚫';
  _toastQueue.push({cp, msg, icon, status});
  if(!_toastShowing) drainToastQueue();
}

function drainToastQueue(){
  if(!_toastQueue.length){ _toastShowing=false; return; }
  _toastShowing = true;
  let {cp, msg, icon, status} = _toastQueue.shift();

  // Remove any existing toast
  let old = document.getElementById('presence-toast');
  if(old) old.remove();

  let toast = document.createElement('div');
  toast.id = 'presence-toast';
  toast.className = 'presence-toast';
  toast.innerHTML =
    '<div style="font-size:20px;color:'+cp.color+';flex-shrink:0;">'+cp.suit+'</div>'
    +'<div style="flex:1;">'
    +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:13px;color:'+cp.color+';letter-spacing:1px;">'+cp.name+'</div>'
    +'<div style="font-size:10px;color:'+(status==='online'?'var(--green2)':'var(--muted)')+';">'
    +(status==='online'?'Came online':'Went offline')+'</div>'
    +'</div>'
    +'<div style="font-size:16px;">'+icon+'</div>';

  document.body.appendChild(toast);

  // Auto-dismiss after 3.5s, then show next in queue
  setTimeout(function(){
    if(toast.parentNode){
      toast.style.animation = 'toastOut 0.25s ease forwards';
      setTimeout(function(){
        if(toast.parentNode) toast.remove();
        setTimeout(drainToastQueue, 200);
      }, 250);
    }
  }, 3500);
}

async function submitWallPost(runData, caption) {
  let ap = getActiveProfile();
  if (!ap) return null;

  let payload = {
    profile_id: ap.id,
    player_name: ap.name,
    player_suit: ap.suit,
    player_color: ap.color,
    score: runData.score,
    chips: runData.chips,
    hands: runData.hands,
    wins: runData.wins,
    bosses: runData.bosses,
    curse: runData.curse,
    luck: runData.luck,
    hardcore: runData.hardcore,
    outcome: runData.outcome,
    final_mod: runData.final_mod || null,
    upgrades: runData.upgrades || [],
    caption: caption || '',
    game: 'chaos-holdem',
    game_mode: _activeCasinoGame || 'poker',
    game_version: CURRENT_VERSION,
    game_version: CURRENT_VERSION
  };

  // Primary post — Chaos Hold'Em server
  let result = await apiPost('/wall', payload);

  // Dual-write — N Games Network wall (fire and forget, don't block)
  if (NGAMES_SERVER_URL && NGAMES_SERVER_URL !== 'PASTE_NGAMES_RAILWAY_URL_HERE') {
    fetch(NGAMES_SERVER_URL + '/wall/post', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: AbortSignal.timeout(8000)
    }).then(function(r) {
      if (r.ok) console.log('[NGames] Wall post synced to N Games Network');
      else console.warn('[NGames] Wall post sync failed:', r.status);
    }).catch(function(e) {
      console.warn('[NGames] Wall post sync error:', e.message);
    });
  }

  return result;
}

// MULTIPLAYER ENGINE — v0.8
// WebSocket client, lobby, Crew Game, Duel Mode
// ════════════════════════════════════════════════════════════

const WS_URL = CHAOS_SERVER_URL.replace('https://','wss://').replace('http://','ws://');
let _ws = null;
let _wsRoom = null;
let _wsReconnectTimer = null;
let _wsCallbacks = {};

function wsConnect(onOpen) {
  if (_ws && _ws.readyState === WebSocket.OPEN) { if(onOpen) onOpen(); return; }
  try {
    _ws = new WebSocket(WS_URL);
    _ws.onopen = () => {
      console.log('WS connected');
      // Register identity
      _ws.send(JSON.stringify({type:'ping', profileId: getActiveProfile()?.id}));
      if (onOpen) onOpen();
    };
    _ws.onmessage = (e) => {
      try { handleWsMessage(JSON.parse(e.data)); } catch(err) { console.error('WS parse error', err); }
    };
    _ws.onclose = () => {
      console.log('WS closed');
      // Only reconnect if we have an active room AND mpActive is still true
      // (prevents reconnect loop after intentional game end)
      if (_wsRoom && _mpActive) {
        _wsReconnectTimer = setTimeout(() => wsConnect(), 3000);
      }
    };
    _ws.onerror = (e) => { console.error('WS error', e); };
  } catch(e) {
    console.error('WS connect failed:', e);
  }
}

function wsSend(msg) {
  let ap = getActiveProfile();
  if (ap) msg.profileId = ap.id;
  if (_ws && _ws.readyState === WebSocket.OPEN) {
    _ws.send(JSON.stringify(msg));
  } else {
    wsConnect(() => _ws.send(JSON.stringify(msg)));
  }
}

function handleWsMessage(msg) {
  console.log('WS msg:', msg.type);
  if (_wsCallbacks[msg.type]) _wsCallbacks[msg.type](msg);

  if (msg.type === 'room_created') {
    _wsRoom = msg.code;
    renderLobby(msg.state);
  } else if (msg.type === 'player_joined') {
    renderLobby(msg.state);
  } else if (msg.type === 'ready_update') {
    renderLobby(msg.state);
  } else if (msg.type === 'game_starting') {
    showOverlay('<div class="pause-panel" style="text-align:center;">'
      +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:32px;color:var(--gold);">GAME STARTING</div>'
      +'<div style="font-size:13px;color:var(--muted);margin-top:8px;">Get ready...</div>'
      +'</div>');
    setTimeout(closeOverlay, 1500);
  } else if (msg.type === 'hand_start') {
    if (_mpActive) renderMultiplayerGame(msg.state, msg.myHole);
  } else if (msg.type === 'your_turn') {
    if (_mpActive) updateMultiplayerGame(msg.state, true);
  } else if (msg.type === 'action') {
    if (_mpActive) updateMultiplayerGame(msg.state, false);
  } else if (msg.type === 'phase') {
    if (_mpActive) updateMultiplayerGame(msg.state, false);
  } else if (msg.type === 'showdown') {
    if (_mpActive) showShowdown(msg);
  } else if (msg.type === 'hand_end') {
    if (_mpActive) showHandEnd(msg);
  } else if (msg.type === 'game_over') {
    if (_mpActive) showGameOver(msg);
  } else if (msg.type === 'admin_broadcast') {
    showAdminBroadcast(msg.message);
  } else if (msg.type === 'crew_run_started') {
    let cp=CREW_PROFILES.find(p=>p.id===msg.profileId);
    if(cp){
      let t=document.createElement('div');t.className='presence-toast';
      let sv=document.createElement('div');sv.style.cssText='font-size:20px;color:'+cp.color+';flex-shrink:0;';sv.textContent=cp.suit;
      let bv=document.createElement('div');bv.style.flex='1';
      let ti=document.createElement('div');ti.style.cssText='font-size:13px;color:'+cp.color+';';ti.style.fontFamily="'Bebas Neue',sans-serif";ti.textContent=cp.name;
      let su=document.createElement('div');su.style.cssText='font-size:10px;color:var(--muted);';su.textContent='Just started a run';
      bv.appendChild(ti);bv.appendChild(su);t.appendChild(sv);t.appendChild(bv);document.body.appendChild(t);
      setTimeout(function(){t.style.animation='toastOut 0.25s ease forwards';setTimeout(function(){if(t.parentNode)t.remove();},300);},3500);
    }
  } else if (msg.type === 'crew_run_completed') {
    let cp=CREW_PROFILES.find(function(p){return p.id===msg.profileId;});
    if(cp){showRunToast(cp,msg.score,msg.outcome);setTimeout(refreshPresenceDots,500);}
  } else if (msg.type === 'dj_claim') {
    handleDJClaim(msg);
  } else if (msg.type === 'dj_sync') {
    handleDJSync(msg);
  } else if (msg.type === 'dj_resign') {
    handleDJResign(msg);
  } else if (msg.type === 'player_disconnected') {
    log(msg.profileId + ' disconnected', 'bad');
  } else if (msg.type === 'error') {
    log('Room error: ' + msg.msg, 'bad');
    closeOverlay();
  }
}

      +(p.connected?'Connected':'Disconnected')+'</div>'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+(p.ready?'#27ae60':'#666')+';"></div>'
      +'</div>';
  }).join('');

      +'<div style="font-size:22px;color:rgba(255,255,255,0.15);">○</div>'

    +'<button class="btn btn-menu" onclick="leaveRoom()" style="font-size:11px;">LEAVE</button>'
    +'</div>'
    +'<div style="background:rgba(0,0,0,0.5);border:2px solid rgba(212,168,67,0.3);border-radius:10px;padding:14px;margin-bottom:14px;">'

    +'<div style="font-size:9px;color:var(--muted);">Share this code with your crew</div>'
    +'</div>'
    + playerRows
    +'<div style="display:flex;gap:8px;margin-top:10px;">'
    +(isHost
      ?'<button class="btn btn-primary" onclick="setReady()" style="flex:2;font-size:14px;padding:10px;'+(canStart?'':'opacity:0.5;')+'">'+
        (canStart?'▶ START GAME':'Waiting for players...')+'</button>'

    +'</div>'

function setReady() {
  let ap = getActiveProfile();
  let me = _wsRoom && _mpState?.players?.find(p=>p.profileId===ap?.id);
  let isReady = me?.ready || false;
  wsSend({type:'ready', ready:!isReady});
}

function hostStartGame() {
  wsSend({type:'start_game'});
}

function leaveRoom() {
  wsSend({type:'leave_room'});
  cleanupMultiplayer();
  showOnlineMenu();
}

function cleanupMultiplayer() {
  _mpActive  = false;
  _mpState   = null;
  _myHole    = [];
  _wsRoom    = null;
  // Kill the WS so no stray messages arrive after leaving
  if (_ws) {
    try {
      _ws.onclose = null; // prevent reconnect loop
      _ws.onerror = null;
      _ws.onmessage = null;
      _ws.close();
    } catch(e) {}
    _ws = null;
  }
  closeOverlay();
}

  return '<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px;">'

function mpRaise() {
  let me = _mpState?.players?.find(p=>p.profileId===getActiveProfile()?.id);

  // Record duel matchup
  if (_mpState?.mode === 'duel' && _mpState.players.length === 2) {
    let winner = _mpState.players.find(p=>p.profileId===msg.winnerId);
    let loser = _mpState.players.find(p=>p.profileId!==msg.winnerId);
    if (winner && loser) recordMatchResult(winner.profileId, loser.profileId);
  }
}

let _lastKnownRunCounts = {};   // profileId -> total_runs
let _lastKnownAchCounts = {};   // profileId -> achievement count


let _myAchievements = {};



function showRunToast(cp, score, outcome) {
  _toastQueue.push({cp, score, outcome, type: 'run'});
  if (!_toastShowing) drainToastQueue();
}

function showAchToast(cp, achId, achName, iHaveIt) {
  _toastQueue.push({cp, achId, achName, iHaveIt, type: 'achievement'});
  if (!_toastShowing) drainToastQueue();
}



// Called by refreshPresenceDots — detect changes and notify
function checkNotifications(profiles, ap) {
  if (!profiles || !ap) return;

  // Load my achievements for comparison
  let pd = loadPD();
  _myAchievements = pd.achievements || {};

  for (let cp of CREW_PROFILES) {
    if (cp.id === ap.id) continue; // skip self
    let sp = profiles.find(function(p) { return p.id === cp.id; });
    if (!sp) continue;

    let isOnline = sp.current_status === 'online';

    // ── Online/offline ────────────────────────────────────────
    if (_lastKnownStatuses[cp.id] !== undefined) {
      let wasOnline = _lastKnownStatuses[cp.id] === 'online';
      if (isOnline && !wasOnline) showPresenceToast(cp, 'online');
      else if (!isOnline && wasOnline) showPresenceToast(cp, 'offline');
    }
    _lastKnownStatuses[cp.id] = isOnline ? 'online' : 'offline';

    // ── Run completed ─────────────────────────────────────────
    let runCount = sp.total_runs || 0;
    if (_lastKnownRunCounts[cp.id] !== undefined && runCount > _lastKnownRunCounts[cp.id]) {
      // Fetch their latest run to get score/outcome
      fetchPlayerRuns(cp.id, 1).then(function(runs) {
        if (runs && runs[0]) {
          showRunToast(cp, runs[0].score, runs[0].outcome);
        }
      }).catch(function(){});
    }
    _lastKnownRunCounts[cp.id] = runCount;

    // ── Achievement unlocked ──────────────────────────────────
    let achs = sp.achievements || {};
    if (typeof achs === 'string') { try { achs = JSON.parse(achs); } catch(e) { achs = {}; } }
    let achCount = Object.keys(achs).length;
    if (_lastKnownAchCounts[cp.id] !== undefined && achCount > _lastKnownAchCounts[cp.id]) {
      // Find which achievement is new
      let prev = _lastKnownAchCounts['_data_'+cp.id] || {};
      for (let achId of Object.keys(achs)) {
        if (!prev[achId]) {
          // Look up achievement name
          let ach = ACHIEVEMENTS ? ACHIEVEMENTS.find(function(a) { return a.id === achId; }) : null;
          let achName = ach ? ach.name : achId;
          let iHaveIt = !!_myAchievements[achId];
          showAchToast(cp, achId, achName, iHaveIt);
          break; // one notification at a time
        }
      }
    }
    _lastKnownAchCounts[cp.id] = achCount;
    _lastKnownAchCounts['_data_'+cp.id] = achs;
  }
}

let _currentGameState = 'in_menu'; // reset on menu, updated during run

// Call this whenever game state changes to keep it fresh
function setPresenceState(state) {
  _currentGameState = state;
}

async function presencePing(status) {
  if (!serverAvailable()) return;
  let ap = getActiveProfile();
  if (!ap) return;

  let payload = {
    profile_id: ap.id,
    status: status,
    game: 'chaos-holdem',
    game_name: "Chaos Hold'Em",
    game_mode: (typeof _activeCasinoGame !== 'undefined' ? _activeCasinoGame : 'poker'),
    version: CURRENT_VERSION,
    game_state: 'in_menu',
    run_hand: 0,
    run_chips: 0,
    run_score: 0,
    run_bosses: 0,
    run_hardcore: false
  };

  // Only include run state if we are CURRENTLY in an active run
  // Check _currentGameState to avoid stale G values from last run
  if (_currentGameState !== 'in_menu' && typeof G !== 'undefined' && G.round > 0) {
    let sc = 0;
    try { sc = calculateScore().total; } catch(e) {}
    payload.game_state = _currentGameState;
    payload.run_hand    = G.round   || 0;
    payload.run_chips   = G.chips   || 0;
    payload.run_score   = sc;
    payload.run_bosses  = (G.bossesDefeated || []).length;
    payload.run_hardcore = G.hardcore || false;
  }

  await apiPost('/presence/ping', payload);

  // N Games Network dual-ping
  if (typeof NGame !== 'undefined') {
    let playtimeSecs = _ngSessionStart ? Math.floor((Date.now()-_ngSessionStart)/1000) : 0;
    try {
      NGame.ping({
        screen:           payload.game_state,
        hand:             payload.run_hand,
        chips:            payload.run_chips,
        score:            payload.run_score,
        bosses:           payload.run_bosses,
        wins:             (typeof G!=='undefined'?G.wins:0),
        hardcore:         payload.run_hardcore,
        lives:            (typeof G!=='undefined'?G.lives:0),
        curse:            (typeof G!=='undefined'?G.totalCurse:0),
        luck:             (typeof G!=='undefined'?G.luck:0),
        playtime_seconds: playtimeSecs,
      });
    } catch(e) {}
  }
}

// SERVER HEALTH MONITOR
// Checks server every 5 minutes, shows banner if down
// ════════════════════════════════════════════════════════════
let _serverStatus = 'unknown'; // 'online' | 'offline' | 'unknown'
let _serverCheckInterval = null;
let _serverBannerShown = false;

async function checkServerHealth(silent) {
  if (!serverAvailable()) return;
  try {
    let r = await fetch(CHAOS_SERVER_URL + '/', {
      signal: AbortSignal.timeout(6000),
      cache: 'no-store'
    });
    let wasOffline = _serverStatus === 'offline';
    _serverStatus = r.ok ? 'online' : 'offline';

    if (_serverStatus === 'online') {
      // Server came back up — dismiss banner and notify
      removeServerDownBanner();
      if (wasOffline && !silent) {
        showServerStatusToast('online');
      }
    } else {
      if (!_serverBannerShown) showServerDownBanner();
    }
  } catch(e) {
    let wasOffline = _serverStatus === 'offline';
    _serverStatus = 'offline';
    if (!_serverBannerShown) showServerDownBanner();
  }
}

function startServerMonitor() {
  checkServerHealth(true);
  if (_serverCheckInterval) clearInterval(_serverCheckInterval);
  _serverCheckInterval = setInterval(function() {
    checkServerHealth(false);
  }, 5 * 60 * 1000); // every 5 minutes
}

function showServerDownBanner() {
  if (_serverBannerShown) return;
  _serverBannerShown = true;

  let banner = document.createElement('div');
  banner.id = 'server-down-banner';

// ── PKCE helpers ──────────────────────────────────────────────
async function generateCodeVerifier() {
  let array = new Uint8Array(56);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateCodeChallenge(verifier) {
  let data = new TextEncoder().encode(verifier);
  let digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ── AUTH ──────────────────────────────────────────────────────
function spotifyLogin() {
  console.log('[Spotify] spotifyLogin called, token:', !!_spotifyToken, 'electronAPI:', !!window.electronAPI);
  log('Connecting to Spotify...', 'chaos');
  if (_spotifyToken) { initSpotifyPlayer(); return; }

  // Open a window SYNCHRONOUSLY right here — before any async work
  // Browsers block window.open() from async contexts, so we must do it now
  let authWindow = null;
  if (!window.electronAPI) {
    authWindow = window.open('about:blank', 'spotify-auth',
      'width=500,height=700,scrollbars=yes,resizable=yes');
    if (!authWindow) {
      log(' Popup blocked — allow popups for this page and try again', 'bad');
      alert('Allow popups for this page in your browser, then click Connect Spotify again.');
      return;
    }
    authWindow.document.write('<p style="font-family:sans-serif;text-align:center;padding:40px;color:#888;">Connecting to Spotify...</p>');
  }

  // Now do async PKCE work
  let ap = getActiveProfile();
  let stateVal = (ap ? ap.id : 'unknown') + '_' + Math.random().toString(36).slice(2);
  localStorage.setItem('spotify_auth_state', stateVal);

  generateCodeVerifier().then(function(verifier) {
    localStorage.setItem('spotify_pkce_verifier', verifier);
    return generateCodeChallenge(verifier);
  }).then(function(challenge) {
    const params = new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      response_type: 'code',
      redirect_uri: SPOTIFY_REDIRECT_URI,
      scope: SPOTIFY_SCOPES,
      state: stateVal,
      code_challenge_method: 'S256',
      code_challenge: challenge,
    });
    const authUrl = 'https://accounts.spotify.com/authorize?' + params.toString();
    console.log('[Spotify] Auth URL:', authUrl);
    log('Opening Spotify login...', 'chaos');

    if (window.electronAPI && window.electronAPI.openExternal) {
      console.log('[Spotify] Calling openExternal:', authUrl);
      log('Opening browser for Spotify login...', 'chaos');
      window.electronAPI.openExternal(authUrl).catch(function(e){
        console.error('[Spotify] openExternal failed:', e);
        // Fallback: try loading in the main window temporarily
        log(' Could not open browser — try clicking the URL in DevTools console', 'bad');
      });
    } else if (authWindow) {
      // Navigate the already-open window to Spotify
      authWindow.location.href = authUrl;
    }
    pollForSpotifyToken();
  });
}

async function pollForSpotifyToken() {
  let ap = getActiveProfile();
  if (!ap) return;
  let attempts = 0;
  let poll = setInterval(async function() {
    attempts++;
    if (attempts > 60) { clearInterval(poll); log(' Spotify login timed out — try again', 'bad'); return; }
    try {
      let r = await fetch(CHAOS_SERVER_URL + '/spotify/token?profile_id=' + ap.id);
      let data = await r.json();

      if (data.code) {
        // PKCE: exchange code for token
        clearInterval(poll);
        log('Exchanging Spotify code...', 'chaos');
        let verifier = localStorage.getItem('spotify_pkce_verifier');
        let tokenResp = await fetch('https://accounts.spotify.com/api/token', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: new URLSearchParams({
            grant_type: 'authorization_code',
            code: data.code,
            redirect_uri: SPOTIFY_REDIRECT_URI,
            client_id: SPOTIFY_CLIENT_ID,
            code_verifier: verifier,
          })
        });
        let tokenData = await tokenResp.json();
        if (tokenData.access_token) {
          _spotifyToken = tokenData.access_token;
          persistSpotifyToken(tokenData.access_token);
          localStorage.removeItem('spotify_pkce_verifier');
          log(' Spotify connected! Login saved.', 'chaos');
          initSpotifyPlayer();
        } else {
          log(' Spotify token exchange failed: ' + (tokenData.error || 'unknown'), 'bad');
          console.error('[Spotify] Token exchange error:', tokenData);
        }
      } else if (data.token) {
        // Legacy: direct token
        clearInterval(poll);
        _spotifyToken = data.token;
        persistSpotifyToken(data.token);
        log(' Spotify connected!', 'chaos');
        initSpotifyPlayer();
      }
    } catch(e) { console.error('[Spotify] Poll error:', e); }
  }, 2000);
}

function loadStoredSpotifyToken() {

function initSpotifyPlayer() {
  if (!_spotifyReady || !_spotifyToken) { loadSpotifySDK(); return; }
  if (_spotifyPlayer) { _spotifyPlayer.disconnect(); }

  let ap = getActiveProfile();
  _spotifyPlayer = new Spotify.Player({
    name: 'Chaos Hold\'Em — ' + (ap ? ap.name : 'Crew'),
    getOAuthToken: function(cb) { cb(_spotifyToken); },
    volume: 0.7,
  });

  _spotifyPlayer.addListener('ready', function(data) {
    _spotifyDeviceId = data.device_id;
    log(' Spotify ready — ' + (ap ? ap.name : ''), 'chaos');
    // Check if there's already a DJ session to join
    checkDJSession();
  });

  _spotifyPlayer.addListener('not_ready', function() {
    _spotifyDeviceId = null;
  });

  _spotifyPlayer.addListener('authentication_error', function() {
    localStorage.removeItem('spotify_token');
    _spotifyToken = null;
    log(' Spotify auth expired — reconnecting...', 'bad');
    spotifyLogin();
  });

  _spotifyPlayer.addListener('player_state_changed', function(state) {
    if (!state) return;
    let track = state.track_window && state.track_window.current_track;
    if (track) {
      let artistStr = track.artists.map(function(a){ return a.name; }).join(', ');
      showNowPlayingToast(track.name, artistStr, _isDJ);
    }
    if (!_isDJ) return;
    // DJ: broadcast state to crew every time it changes
    broadcastDJState(state);
    updateCrewRadioUI(state, true);
  });

  _spotifyPlayer.connect();
}

async function spotifyPlay(contextUri) {

async function spotifySeekAndPlay(trackUri, positionMs) {
  if (!_spotifyToken || !_spotifyDeviceId) return;
  try {
    // First set the track
    await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + _spotifyDeviceId, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + _spotifyToken,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        uris: [trackUri],
        position_ms: positionMs,
      }),
    });
  } catch(e) { console.error('Spotify sync error:', e); }
}

async function broadcastCurrentState() {
  if (!_isDJ || !_spotifyPlayer) return;
  let state = await _spotifyPlayer.getCurrentState();
  if (state) broadcastDJState(state);
}

function broadcastDJState(state) {
  if (!state || !state.track_window) return;
  let track = state.track_window.current_track;
  let syncMsg = {
    type: 'dj_sync',
    trackUri: track.uri,
    trackName: track.name,
    artist: track.artists.map(function(a){ return a.name; }).join(', '),
    albumArt: track.album.images[0]?.url || '',
    positionMs: state.position,
    duration: state.duration,
    isPlaying: !state.paused,
    timestamp: Date.now(), // so listeners can compensate for network delay
  };
  _lastSyncState = syncMsg;
  wsSend(syncMsg);
}

// ── LISTENER SYNC ─────────────────────────────────────────────
async function applyDJSync(msg) {
  if (_isDJ) return; // DJ doesn't sync to itself
  if (!_spotifyPlayer || !_spotifyDeviceId) return;

  // Compensate for network travel time
  let networkLatency = (Date.now() - msg.timestamp) / 2;
  let targetPosition = msg.positionMs + networkLatency;

  // Check current state
  let state = await _spotifyPlayer.getCurrentState();
  let currentTrackUri = state?.track_window?.current_track?.uri;
  let currentPosition = state?.position || 0;

  let drift = Math.abs(currentPosition - targetPosition);
  let wrongTrack = currentTrackUri !== msg.trackUri;

  // Only seek if drift > 1500ms or wrong track — avoids micro-seeks causing hiccups
  if (wrongTrack || drift > 1500) {
    await spotifySeekAndPlay(msg.trackUri, Math.round(targetPosition));
  } else if (drift > 800) {
    // Small drift — just seek
    await _spotifyPlayer.seek(Math.round(targetPosition));
  }

  // Pause/resume to match DJ
  if (msg.isPlaying && state?.paused) {
    _spotifyPlayer.resume();
  } else if (!msg.isPlaying && !state?.paused) {
    _spotifyPlayer.pause();
  }

  updateCrewRadioUI(msg, false);
}

async function checkDJSession() {
  // Ask server if there's an active DJ session to join
  try {
    let data = await apiGet('/spotify/dj-session');
    if (data && data.active && data.lastSync) {
      // There's a DJ — sync immediately
      _djProfileId = data.djProfileId;
      applyDJSync(data.lastSync);
      log(' Joined crew radio — ' + data.djName + ' is DJ', 'chaos');
      startListenerSync();
    }
  } catch(e) {}
}

function startListenerSync() {
  if (_listenerSyncInterval) clearInterval(_listenerSyncInterval);
  // Listeners re-sync every 2s as well
  _listenerSyncInterval = setInterval(async function() {
    if (!_lastSyncState || _isDJ) return;
    let age = Date.now() - _lastSyncState.timestamp;
    // Simulate position advancement
    let simulated = { ..._lastSyncState, positionMs: _lastSyncState.positionMs + age };
    await applyDJSync(simulated);
  }, 2000);
}

function stopListenerSync() {
  if (_listenerSyncInterval) clearInterval(_listenerSyncInterval);
  _listenerSyncInterval = null;
}

let _lastShownTrackUri = null;
let _nowPlayingTimeout = null;

function showNowPlayingToast(trackName, artist, isDJ) {
  // Don't show same track twice in a row
  let key = trackName + artist;
  if (key === _lastShownTrackUri) return;
  _lastShownTrackUri = key;

  // Remove existing
  let old = document.getElementById('now-playing-toast');
  if (old) old.remove();
  if (_nowPlayingTimeout) clearTimeout(_nowPlayingTimeout);

  let toast = document.createElement('div');
  toast.id = 'now-playing-toast';

  // Animated bars
  let bars = document.createElement('div');
  bars.className = 'np-bars';
  for (let i = 0; i < 4; i++) {
    let bar = document.createElement('div');
    bar.className = 'np-bar';
    bars.appendChild(bar);
  }

  // Track info
  let info = document.createElement('div');
  info.style.flex = '1';
  info.style.minWidth = '0';

  let label = document.createElement('div');
  label.style.cssText = 'font-size:8px;letter-spacing:2px;color:#1db954;margin-bottom:3px;';
  label.textContent = isDJ ? 'NOW PLAYING — YOU ARE DJ' : 'NOW PLAYING — CREW RADIO';

  let track = document.createElement('div');
  track.style.cssText = 'font-size:14px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
  track.textContent = trackName;

  let art = document.createElement('div');
  art.style.cssText = 'font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
  art.textContent = artist;

  info.appendChild(label);
  info.appendChild(track);
  info.appendChild(art);

  // Spotify logo
  let logo = document.createElement('div');
  logo.style.cssText = 'font-size:20px;flex-shrink:0;color:#1db954;';
  logo.textContent = '♫';

  toast.appendChild(bars);
  toast.appendChild(info);
  toast.appendChild(logo);
  document.body.appendChild(toast);

  // Auto dismiss after 5s with fade
  _nowPlayingTimeout = setTimeout(function() {
    toast.style.animation = 'none';
    toast.style.transition = 'opacity 0.5s, transform 0.5s';
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(10px)';
    setTimeout(function() { if (toast.parentNode) toast.remove(); }, 500);
  }, 5000);
}

  }

  // N Games server direct (backup)
  if (NGAMES_SERVER_URL && NGAMES_SERVER_URL !== 'PASTE_NGAMES_RAILWAY_URL_HERE') {
    fetch(NGAMES_SERVER_URL + '/sessions', {
      method: 'POST',

    current_game: _activeCasinoGame || 'poker',
        game_mode: gameMode,
        ...runData,
      }),
      signal: AbortSignal.timeout(8000)
    }).catch(()=>{});
  }
}

let _sessionStartTime=null,_playTimeInterval=null;
let _afkStartTime=null; // time when we went to menu/afk
let _lastIngameSyncSecs=0,_lastAfkSyncSecs=0; // deltas for server sync

function startPlayTimeTracking(){
  _sessionStartTime=Date.now();
  _afkStartTime=null;
  _playTimeInterval=setInterval(flushPlayTime,30000);
}
function startAfkTracking(){
  if(_sessionStartTime){
    // Flush any remaining ingame time first
    let elapsed=Math.floor((Date.now()-_sessionStartTime)/1000);
    _sessionStartTime=null;
    let pd=loadPD();pd.playTimeSecs=(pd.playTimeSecs||0)+elapsed;savePD(pd);
    _lastIngameSyncSecs+=elapsed;
  }
  _afkStartTime=Date.now();
}
function stopAfkTracking(){
  if(_afkStartTime){
    let elapsed=Math.floor((Date.now()-_afkStartTime)/1000);
    _afkStartTime=null;
    let pd=loadPD();pd.amariHours=(pd.amariHours||0)+elapsed;savePD(pd);
    _lastAfkSyncSecs+=elapsed;
  }
}
function flushPlayTime(){
  if(_sessionStartTime){
    let elapsed=Math.floor((Date.now()-_sessionStartTime)/1000);
    _sessionStartTime=Date.now();
    let pd=loadPD();pd.playTimeSecs=(pd.playTimeSecs||0)+elapsed;savePD(pd);
    _lastIngameSyncSecs+=elapsed;
  }
  if(_afkStartTime){
    let elapsed=Math.floor((Date.now()-_afkStartTime)/1000);
    _afkStartTime=Date.now();
    let pd=loadPD();pd.amariHours=(pd.amariHours||0)+elapsed;savePD(pd);
    _lastAfkSyncSecs+=elapsed;
  }
}
function stopPlayTimeTracking(){
  flushPlayTime();
  if(_playTimeInterval){clearInterval(_playTimeInterval);_playTimeInterval=null;}
  _sessionStartTime=null;
  _afkStartTime=null;
}
function formatPlayTime(secs){
  if(!secs)return'0h 0m';
  let h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  return(h>0?h+'h ':'')+m+'m';
}

// ════════════════════════════════════════════════════════════
function parseCSV(csv){
  let rows=csv.trim().split('\n');if(rows.length<2)return[];
  let headers=rows[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return rows.slice(1).map(line=>{
    let vals=[],cur='',inQ=false;
    for(let c of line){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    let obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||'';});return obj;
  });
}
async function fetchGlobalLeaderboard(){
  try{
    let res=await fetch(SHEETS_CSV_URL,{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    let rows=parseCSV(await res.text());
    return rows.map(r=>({
      player:r.Player||r.player||'Unknown',
      score:parseInt(r.Score||r.score||0),
      chips:parseInt(r.Chips||r.chips||0),
      hands:parseInt(r.Hands||r.hands||0),
      wins:parseInt(r.Wins||r.wins||0),
      bosses:parseInt(r.Bosses||r.bosses||0),
      hardcore:(r.Hardcore||r.hardcore||'').toLowerCase()==='hardcore',
      date:r.Date||r.date||'',
    })).filter(r=>r.player&&r.score>0);
  }catch(e){console.log('Sheets fetch failed:',e);return null;}
}

// LEADERBOARD SYSTEM
// Stores runs locally, submits to Google Sheets when live.
// To go live: replace SHEETS_ENDPOINT with your Apps Script URL.
// ════════════════════════════════════════════════════════════
const CREW_NAMES=['Sean','Dart','Amari','Keshawn'];
const SHEETS_ENDPOINT='https://script.google.com/macros/s/AKfycbwJvOeOavy5QRSc0blm68TdGfe2eOmslHCS-lQisb1MiLraCuDJ-_XQE9I4bnmPQTIFiQ/exec';

function getLeaderboardData(){
  try{return JSON.parse(localStorage.getItem('chaosHoldemLeaderboard')||'[]');}
  catch(e){return[];}
}
function saveLeaderboardData(runs){
  try{localStorage.setItem('chaosHoldemLeaderboard',JSON.stringify(runs));}
  catch(e){}
}

async function submitRunToLeaderboard(playerName, runData){
  let ap=getActiveProfile();if(ap)playerName=ap.name;
  // Always save locally
  let runs=getLeaderboardData();
  let entry={
    id:Date.now(),
    player:playerName,
    score:runData.score,
    chips:runData.chips,
    hands:runData.hands,
    wins:runData.wins,
    bosses:runData.bosses,
    curse:runData.curse,
    luck:runData.luck,
    hardcore:runData.hardcore,
    date:new Date().toLocaleDateString(),
    timestamp:Date.now()
  };
  runs.push(entry);
  // Keep max 200 entries locally
  runs.sort((a,b)=>b.score-a.score);
  if(runs.length>200)runs=runs.slice(0,200);
  saveLeaderboardData(runs);

  // Submit to Google Sheets if endpoint is configured
  if(SHEETS_ENDPOINT&&SHEETS_ENDPOINT!=='PASTE_YOUR_APPS_SCRIPT_URL_HERE'){
    try{
      // Must use GET with URL params — Apps Script redirects POST cross-origin
      // and no-cors silently breaks JSON parsing
      let params = new URLSearchParams({
        player: entry.player,
        score: entry.score,
        chips: entry.chips||0,
        hands: entry.hands||0,
        wins: entry.wins||0,
        bosses: entry.bosses||0,
        curse: entry.curse||0,
        luck: entry.luck||0,
        hardcore: entry.hardcore?'HARDCORE':'Normal',
        date: entry.date,
        runId: entry.id
      });
      let r = await fetch(SHEETS_ENDPOINT+'?'+params.toString(),{
        method:'GET',
        signal:AbortSignal.timeout(8000)
      });
      let text = await r.text();
      console.log('Sheets response:',text);
    }catch(e){console.log('Sheets submit failed:',e.message);}
  }
  return entry;
}

// AUTO-UPDATER FRAMEWORK — v0.6.5
// Checks GitHub Releases for newer version on launch.
// Wire GITHUB_RELEASES_URL when repo is set up.
// ════════════════════════════════════════════════════════════
const CURRENT_VERSION = '1.2.0';
const GITHUB_RELEASES_URL = 'https://api.github.com/repos/ktdtech223dev/chaos-holdem-client/releases/latest';
// e.g. 'https://api.github.com/repos/ktdtech223dev/chaos-holdem-client/releases/latest'

function versionIsNewer(remote, current){
  const rp = remote.replace(/^v/,'').split('.').map(Number);
  const cp = current.replace(/^v/,'').split('.').map(Number);
  for(let i=0;i<Math.max(rp.length,cp.length);i++){
    const r=rp[i]||0, c=cp[i]||0;
    if(r>c)return true;
    if(r<c)return false;
  }
  return false;
}

async function checkForUpdates(silent=false){
  if(!GITHUB_RELEASES_URL||GITHUB_RELEASES_URL==='PASTE_GITHUB_RELEASES_URL_HERE'){
    if(!silent)log('Auto-updater: no GitHub URL configured yet.','bad');
    return;
  }
  try{
    let r=await fetch(GITHUB_RELEASES_URL,{
      headers:{'Accept':'application/vnd.github.v3+json'},
      signal:AbortSignal.timeout(5000)
    });
    if(!r.ok)return;
    let data=await r.json();
    let remoteVersion=(data.tag_name||'').replace(/^v/,'');
    let notes=data.body||'No changelog provided.';
    let assetUrl=(data.assets||[]).find(a=>a.name.endsWith('.exe'))?.browser_download_url||null;

    if(versionIsNewer(remoteVersion,CURRENT_VERSION)){
      showUpdateOverlay(remoteVersion,notes,assetUrl);
    }
  }catch(e){
    // Silent fail — server unavailable or offline
  }
}

let _pendingUpdateUrl=null;
function showUpdateOverlay(newVersion, notes, downloadUrl){
  _pendingUpdateUrl=downloadUrl;
  let html='<div class="pause-panel" style="max-width:520px;">'
    +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:26px;letter-spacing:3px;color:var(--gold);margin-bottom:4px;">UPDATE AVAILABLE</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">'
    +'<div style="font-size:11px;color:var(--muted);">v'+CURRENT_VERSION+'</div>'
    +'<div style="color:var(--gold);">&#8594;</div>'
    +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;color:var(--green2);">v'+newVersion+'</div>'
    +'</div>'
    +'<div style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px;margin-bottom:14px;max-height:200px;overflow-y:auto;">'
    +'<div style="font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;">WHAT\'S NEW</div>'
    +'<div style="font-size:11px;color:var(--text);line-height:1.7;white-space:pre-wrap;">'+notes+'</div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;">'
    +(downloadUrl
      ?'<button class="btn btn-primary" onclick="doUpdate()" style="flex:2;font-size:14px;padding:10px;">UPDATE NOW &#8594;</button>'
      :'<button class="btn btn-primary" style="flex:2;font-size:14px;padding:10px;opacity:0.5;cursor:default;">DOWNLOAD UNAVAILABLE</button>')
    +'<button class="btn btn-menu" onclick="dismissUpdate()" style="flex:1;font-size:13px;padding:10px;">NOT NOW</button>'
    +'</div>'
    +'</div>';
  showOverlay(html);
}

function doUpdate(){
  let url=_pendingUpdateUrl;if(!url)return;
  // In Electron: open the download URL in the OS browser
  // The user runs the installer which replaces the old exe and relaunches
  if(typeof window.require==='function'){
    try{
      const {shell}=window.require('electron');
      shell.openExternal(url);
      // Give a moment then quit so there are no hung processes
      setTimeout(()=>{document.title='CHAOS_EXIT';},2000);
      showOverlay('<div class="pause-panel" style="text-align:center;">'
        +'<div style="font-size:40px;margin-bottom:12px;">&#8681;</div>'
        +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:var(--gold);margin-bottom:8px;">DOWNLOADING UPDATE</div>'
        +'<div style="font-size:11px;color:var(--muted);line-height:1.7;">Your browser is opening the installer.<br>Run it — the game will close and relaunch automatically.<br><span style="color:rgba(255,255,255,0.3);font-size:9px;">Closing old version in 2 seconds...</span></div>'
        +'</div>');
      return;

async function checkCrewHighScores(){
  let lastCheck=0;
  try{lastCheck=parseInt(localStorage.getItem('chaosLastHSCheck')||'0');}catch(e){}
  if(!lastCheck){try{localStorage.setItem('chaosLastHSCheck',Math.floor(Date.now()/1000));}catch(e){}return;}
  let profiles=await fetchAllProfiles();
  if(!profiles)return;
  let ap=getActiveProfile();
  let shown=false;
  for(let cp of CREW_PROFILES){
    if(ap&&cp.id===ap.id)continue;
    let sp=profiles.find(p=>p.id===cp.id);if(!sp)continue;
    let storedKey='chaosLastKnownHS_'+cp.id;
    let lastKnown=0;try{lastKnown=parseInt(localStorage.getItem(storedKey)||'0');}catch(e){}
    let current=sp.best_score||0;
    if(lastKnown>0&&current>lastKnown&&!shown){shown=true;showCrewHighScoreBanner(cp,current,lastKnown);}
    try{localStorage.setItem(storedKey,current);}catch(e){}
  }
  try{localStorage.setItem('chaosLastHSCheck',Math.floor(Date.now()/1000));}catch(e){}
}

function confirmExit(){
  // Fire all failsafes simultaneously — one WILL work
  try { stopPresence(); } catch(e) {}
  try { closeOverlay(); } catch(e) {}

  // 1. IPC direct quit (primary — Electron)
  try {
    if(window.electronAPI && typeof window.electronAPI.quitApp==='function'){
      window.electronAPI.quitApp();
    }
  } catch(e) {}

  // 2. Title signal (backup — caught by main.js page-title-updated)
  try { document.title = 'CHAOS_EXIT'; } catch(e) {}

  // 3. window.close() after short delay
  setTimeout(function(){ try{ window.close(); }catch(e){} }, 300);

  // 4. Hard reload to a blank page (makes it feel closed even if window persists)
  setTimeout(function(){
    try{
      document.body.innerHTML = '<div style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="window.close()">'
        +'<div style="text-align:center;color:rgba(255,255,255,0.15);font-family:monospace;font-size:12px;letter-spacing:2px;">CLOSING...<br><br><span style="font-size:10px;">Click to force close</span></div>'
        +'</div>';
      // Keep hammering close every 200ms
      let closeAttempts = 0;
      let closeInterval = setInterval(function(){
        closeAttempts++;
        try{ window.close(); }catch(e){}
        try{ if(window.electronAPI) window.electronAPI.quitApp(); }catch(e){}
        if(closeAttempts > 10) clearInterval(closeInterval);
      }, 200);
    }catch(e){}
  }, 500);
}

function adminNuclearLocal() {
  if (!confirm('Delete ALL local Chaos Hold\'Em data?')) return;
  let keys = [];
  for (let i=localStorage.length-1;i>=0;i--) {
    let k=localStorage.key(i);
    if(k&&k.startsWith('chaos'))keys.push(k);
  }
  keys.forEach(k=>localStorage.removeItem(k));
  adminOut('✓ Nuked '+keys.length+' local keys. Reloading...');
  setTimeout(()=>window.location.reload(), 1500);
}

// ── ChaosAchievements v1 (embedded) ────────────────────────────
// ── N Games Achievement Tracker for Chaos Casino ─────────────────────────────
// Drop this file in the project and call ChaosAchievements.init() after NGame.init()
// It hooks into game state and fires achievements in real-time as thresholds are crossed

const ChaosAchievements = (() => {
  // Track what we've already reported this run to avoid spam
  const _reported = new Set();
  // Track cross-run state from localStorage
  const _persist = {
    get: (k) => { try { return JSON.parse(localStorage.getItem('ng_ach_' + k) || 'null'); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem('ng_ach_' + k, JSON.stringify(v)); } catch(e) {} },
    inc: (k, by = 1) => { const v = (ChaosAchievements._persist.get(k) || 0) + by; ChaosAchievements._persist.set(k, v); return v; },
  };

  function unlock(id) {
    if (_reported.has('u:' + id)) return;
    _reported.add('u:' + id);
    try { NGame.unlockAchievement(id).catch(() => {}); } catch(e) {}
  }

  function progress(id, val) {
    const key = 'p:' + id + ':' + val;
    if (_reported.has(key)) return;
    _reported.add(key);
    try { NGame.updateProgress(id, val).catch(() => {}); } catch(e) {}
  }

  return {
    _persist,

    // Call at the start of every run
    onRunStart(G) {
      _reported.clear();
    },

    // Call every hand/round tick — pass current game state G
    onTick(G) {
      // ── Win streaks ──────────────────────────────────────────────────────
      const ws = G.winStreakCurrent || G.winStreak || 0;
      if (ws >= 3)  unlock('win_streak_3');
      if (ws >= 5)  unlock('win_streak_5');
      if (ws >= 7)  unlock('win_streak_7');
      if (ws >= 10) unlock('win_streak_10');

      // ── Chip milestones ──────────────────────────────────────────────────
      const chips = G.chips || 0;
      if (chips >= 5000)  { unlock('stack_5k');  progress('ch_big_stack', chips); }
      if (chips >= 10000) { unlock('stack_10k'); progress('ch_big_stack', chips); unlock('ch_big_stack'); }
      if (chips >= 25000) unlock('stack_25k');

      // ── Round/hand milestones ────────────────────────────────────────────
      const round = G.round || G.hands || 0;
      if (round >= 15)  progress('survive_15', round);
      if (round >= 20)  progress('survive_20', round);
      if (round >= 30)  progress('survive_30', round);
      if (round >= 100) progress('ch_century',  round);

      // ── Curse milestones ─────────────────────────────────────────────────
      const curse = G.totalCurse || G.curse || 0;
      if (curse >= 10)  progress('curse_10',    curse);
      if (curse >= 25)  progress('curse_25',    curse);
      if (curse >= 50)  progress('curse_50',    curse);
      if (curse >= 75)  progress('curse_75',    curse);
      if (curse >= 80)  progress('ch_curse_80', curse);
      if (curse >= 90)  progress('max_curse',   curse);
      if (curse >= 100) unlock('curse_100');

      // ── Luck milestones ──────────────────────────────────────────────────
      const luck = G.luck || 0;
      if (luck >= 50)  progress('luck_50',  luck);
      if (luck >= 100) progress('luck_100', luck);

      // ── Lives ────────────────────────────────────────────────────────────
      if ((G.lives || 0) >= 5) unlock('max_lives');

      // ── Score ────────────────────────────────────────────────────────────
      const score = G.score || 0;
      if (score >= 10000) progress('score_10k',      score);
      if (score >= 50000) progress('ch_high_roller',  score);
    },

    // Call on every hand win
    onHandWin(G) {
      unlock('first_win');
      const handType = G.lastHandRank || G.handScore?.[0];
      if (handType === 8) { unlock('royal_flush');   unlock('ch_royal_run'); }
      if (handType === 7)   unlock('straight_flush');
      if (handType === 4)   unlock('four_kind');
      if (handType === 1)   unlock('win_low_hand');

      // Pot wins
      const pot = G.lastPot || G.potSize || 0;
      if (pot >= 1000) unlock('win_pot_1k');
      if (pot >= 5000) unlock('win_pot_5k');

      // All-in win
      if (G.allInWinThisRun) unlock('all_in_win');

      // Curse card win
      if (G.curseCards?.length > 0) progress('curse_win_5', ((_persist.get('curse_wins') || 0) + 1));
      if (G.curseCards?.length > 0) _persist.set('curse_wins', (_persist.get('curse_wins') || 0) + 1);

      // Modifier wins
      const mod = G.currentModifier || G.activeMod || '';
      if (mod === 'upside_down' || mod === 'lowwins')     unlock('survive_lowwins');
      if (mod === 'all_in_only' || mod === 'allinonly')   unlock('survive_allinonly');
      if (mod === 'ghost_showdown')                        unlock('win_ghostshowdown');
      if (mod === 'combo_round'   || mod === 'combo')     unlock('win_combo');
      if (mod === 'luck_round'    || mod === 'luck')      unlock('win_luckround');
      if (mod === 'half_deck'     || mod === 'halfDeck')  unlock('survive_halfDeck');
      if (mod === 'ante_frenzy'   || mod === 'ante')      unlock('win_ante_frenzy');
      if (mod === 'copycat'       || mod === 'copy')      unlock('win_copy');
    },

    // Call when player goes broke
    onBroke(G) {
      const brokeCount = G.brokeCount || 0;
      if (brokeCount >= 2) progress('broke_twice', brokeCount);
      if (brokeCount >= 5) unlock('secret_broke_5');
    },

    // Call on boss fight start
    onBossStart(G, bossId) {
      unlock('boss_first');
    },

    // Call on boss defeat
    onBossDefeat(G, bossId) {
      const bossMap = {
        'doyle':      'beat_doyle',
        'phil':       'beat_phil',
        'annie':      'beat_annie',
        'stu':        'beat_stu',
        'negreanu':   'beat_negreanu',
        'moneymaker': 'beat_moneymaker',
        'ivey':       'beat_ivey',
        'ferguson':   'beat_ferguson',
        'hachem':     'beat_hachem',
        'mortensen':  'beat_mortensen',
        'xi':         'beat_xi',
        'duo':        'beat_duo',
        'mystery':    'beat_mystery',
      };
      if (bossMap[bossId]) unlock(bossMap[bossId]);
      if (G.hardcore && bossId === 'xi')       unlock('beat_xi_hc');
      if (G.hardcore && bossId === 'negreanu') unlock('hardcore_negreanu');
      if (G.hardcore)                           unlock('hardcore_boss');

      // Cumulative boss count
      const total = _persist.inc('total_bosses');
      progress('ch_boss_slayer', total);

      // No damage boss
      if (G.bossChipsLost === 0) unlock('boss_no_damage');

      // All bosses in one run
      if ((G.bossesDefeated?.length || 0) >= 10) {
        unlock('beat_all_bosses');
        unlock('beat_all_new_bosses');
        unlock('ch_chaos_master');
      }
    },

    // Call on shop purchase
    onShopBuy(G, item) {
      unlock('buy_first');
      const totalBuys = _persist.inc('total_buys');
      progress('buy_10', totalBuys);

      if (item?.cursed || item?.shop === 'curse') unlock('buy_cursed_upgrade');
      if (item?.luck > 0) unlock('luck_upgrade');

      const owned = G.upgrades?.filter(u => u.owned)?.length || 0;
      if (owned >= 5) unlock('full_inventory');

      const epics = G.upgrades?.filter(u => u.owned && u.tier === 'epic')?.length || 0;
      if (epics >= 3) unlock('ch_full_epic');

      // Skip tracker — reset on buy
      _persist.set('shop_skips', 0);
    },

    // Call when player skips shop
    onShopSkip(G) {
      const skips = _persist.inc('shop_skips');
      if (skips >= 3) unlock('skip_3_shops');
    },

    // Call when active item is used
    onItemUse(G, itemId) {
      unlock('use_active_item');
      const active = G.activeItems?.length || 0;
      if (active >= 3) { unlock('active_items_3'); unlock('buy_active_3'); }
      if (itemId === 'smoke_bomb' || itemId === 'smokeB') unlock('use_smokeB');
      if (itemId === 'time_stop'  || itemId === 'timeStop') unlock('use_timeStop');
      if (itemId === 'cleanse')    unlock('cleanse');
    },

    // Call when jackpot lottery fires
    onJackpot(G) {
      unlock('win_jackpot');
    },

    // Call when bounty is collected
    onBounty(G) {
      const total = _persist.inc('bounties');
      progress('bounty_collect', total);
    },

    // Call on Show All modifier win
    onShowAll(G) {
      unlock('curse_showAll');
    },

    // ── Mode-specific ──────────────────────────────────────────────────────

    // Blackjack
    onBjNatural21(G) {   unlock('bj_21'); },
    onBjDealerBust(G) {
      const total = _persist.inc('bj_dealer_busts');
      progress('bj_dealer_bust', total);
    },
    onBjSplitWin(G) {    unlock('bj_split_win'); },
    onBjDoubleWin(G) {
      const total = _persist.inc('bj_doubles');
      progress('bj_double_win', total);
    },
    onBjInsuranceWin(G) { unlock('bj_insured'); },

    // Slots
    onSlotsJackpot(G, multiplier) {
      if (multiplier >= 50)  unlock('sl_mega_jackpot');
      else                   unlock('sl_jackpot');
    },
    onSlotsMachineAdvance(G, machineNum) {
      progress('sl_machine_5',  machineNum);
      progress('sl_machine_10', machineNum);
      progress('sl_machine_20', machineNum);
      if (machineNum >= 3) unlock('sl_boss_1');
    },
    onSlotsStreakWin(G) {
      const streak = G.slotStreak || G.streakCur || 0;
      if (streak >= 5) unlock('sl_streak');
    },
    onSlotsCursedReel(G) { unlock('sl_curse_reel'); },
    onSlotsLastPull(G) {
      if ((G.pullsLeft || 0) <= 1) { unlock('sl_perfect'); unlock('sl_comeback'); }
    },

    // Crash
    onCrashCashout(G, mult) {
      if (mult >= 10)  unlock('cr_10x');
      if (mult >= 50)  unlock('cr_50x');
      if (mult >= 100) unlock('cr_100x');
      const wins = _persist.inc('crash_wins');
      progress('cr_survive_10', wins);
      progress('cr_survive_25', wins);
      // Near-max cashout precision
      if (G.maxMult && Math.abs(mult - G.maxMult) <= 0.1) {
        const precise = _persist.inc('cr_precise');
        if (precise >= 10) unlock('cr_perfect_run');
      }
    },
    onCrashCurseBlock(G) { unlock('cr_curse_blocked'); },
    onCrashNearEscape(G, mult) {
      if (G.cursed) unlock('cr_curse_escape');
    },

    // Roulette
    onRouletteWin(G, number) {
      if (number === 0) {
        unlock('rl_zero');
        const zeros = _persist.inc('rl_zeros');
        if (zeros >= 3) unlock('rl_zero_3');
      }
      const red   = G.redStreak   || 0;
      const black = G.blackStreak || 0;
      if (red >= 10)   unlock('rl_red_10');
      if (black >= 10) unlock('rl_black_10');
      const straightUps = _persist.inc('rl_straight_ups');
      if (straightUps >= 5) unlock('rl_straight_up');
    },
    onRouletteCurseReveal(G) { unlock('rl_curse_reveal'); },
    onRouletteCurseDodge(G)  { unlock('rl_curse_dodge'); },
    onRouletteFullBoard(G)   { unlock('rl_full_board'); },

    // ── Run end ───────────────────────────────────────────────────────────

    // Call on run end (win, cashout, or bust)
    onRunEnd(G, outcome) {
      const isWin = outcome === 'win' || outcome === 'cashout';
      const round = G.round || G.hands || 0;
      const score = G.score || 0;

      // Total runs
      const totalRuns = _persist.inc('total_runs');
      progress('ch_survivor',  totalRuns);
      progress('ch_dedicated', totalRuns);

      // Total hands won
      const totalWins = _persist.get('total_wins') || 0;
      const newWins   = totalWins + (G.wins || 0);
      _persist.set('total_wins', newWins);
      progress('win_50_hands',  newWins);
      progress('win_100_hands', newWins);

      if (isWin) {
        unlock('cash_out');
        if (totalRuns === 1) unlock('first_cashout');
        if (score >= 15000)  unlock('cash_out_high');
        if (round >= 15)     unlock('cash_out_15');
        if (round >= 30)     unlock('cash_out_30');
        if (!G.wentBroke)    unlock('ch_untouchable');
        if (G.lives === 1)   unlock('one_life_win');
        if (G.hardcore)      { unlock('hardcore_win'); unlock('ch_hardcore'); }
        if (G.totalCurse === 0) unlock('ch_clean_run');
      }

      if (G.brokeCount >= 2) progress('broke_twice', G.brokeCount);

      // Cross-game tracking
      const modesPlayed = _persist.get('modes_played') || {};
      if (G.game_mode) modesPlayed[G.game_mode] = true;
      _persist.set('modes_played', modesPlayed);
      if (Object.keys(modesPlayed).length >= 5) unlock('xg_all_games');

      // Crew secret achievements
      const profileId = G.profile_id || (typeof activeProfile !== 'undefined' ? activeProfile?.id : null);
      if (profileId === 'sean')    unlock('friend_sean');
      if (profileId === 'dart')    unlock('friend_dart');
      if (profileId === 'amari')   unlock('friend_amari');
      if (profileId === 'keshawn') unlock('friend_keshawn');

      // Secret: no raises
      if (G.raisedThisRun === false) unlock('secret_no_raise');

      // Secret: max luck AND high curse in same run
      if ((G.luck || 0) >= 100 && (G.totalCurse || 0) >= 50) {
        unlock('secret_luck_curse');
        unlock('secret_lucky100');
      }

      // Secret: zero curse, zero items
      if ((G.totalCurse || 0) === 0 && (G.upgrades?.filter(u=>u.owned)?.length || 0) === 0) {
        unlock('secret_clean_run');
      }
    },

    // Call once when all 4 profiles have been used this session
    onAllProfilesUsed() { unlock('secret_names_all'); },

    // Call when all AI fold in one hand
    onAllFold(G) { unlock('secret_all_fold'); },

    // Call on two AI bust-outs in one hand
    onDoubleBust(G) { unlock('secret_duo_trigger'); },
  };
})();
