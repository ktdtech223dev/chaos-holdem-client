function _executeActiveItem(idx){
  let items=G.activeItems||[];
  let item=items[idx];if(!item)return;
  initAudio();
  let you=G.players[G.youIdx];
  switch(item.effect){
    case 'allFold':
      G.players.forEach(p=>{if(!p.isYou&&!p.folded){p.folded=true;p.lastAction='Folded';}});
      log('Smoke Bomb! All opponents fold!','win');sfx('win');
      setTimeout(()=>awardPot([you]),400);
      break;
    case 'swapHand':
      let ai=G.players.find(p=>!p.isYou&&!p.folded&&!p.allIn);
      if(ai){let tmp=you.cards;you.cards=ai.cards;ai.cards=tmp;log(' Hand swapped with '+ai.name+'!','chaos');sfx('shop');renderPlayers();}
      else{log('No opponent to swap with!','bad');return;}
      break;
    case 'addLife':
      G.lives=Math.min(G.lives+1,7);renderStats();
      log('Extra Life! Lives: '+G.lives,'win');sfx('win');
      unlockAchievement('max_lives');
      break;
    case 'doublePot':
      G.pot=G.pot*2;let pd2=document.getElementById('pot-display');if(pd2)pd2.textContent='$'+G.pot;
      log('Pot Doubled! Now $'+G.pot,'chaos');sfx('raise');
      break;
    case 'peekAll':
      G.peekedPlayer=-2; // special: all revealed
      renderPlayers();log('All AI hands revealed!','chaos');
      break;
    case 'flipCommunity':
      let numC=G.community.length;G.community=[];
      for(let i=0;i<numC;i++)if(G.deck.length)G.community.push(G.deck.pop());
      renderCommunity();log('Community cards redrawn!','chaos');sfx('newstreet');
      break;
    case 'freezeAI':
      G.nextAIFrozen=true;log('Next AI must check!','chaos');
      break;
    case 'addChips':
      G.chips+=300;if(you)you.chips+=300;renderStats();
      log('+$300 added to your stack!','win');sfx('win');
      break;
    case 'reduceCurse':
      G.totalCurse=Math.max(0,G.totalCurse-15);
      log('Cleanse! -15 curse.','win');sfx('shop');
      unlockAchievement('cleanse');
      break;
    case 'undoAI':
      log('⏰ Time Stop — AI must re-act!','chaos');
      if(!G.players[G.toAct]?.isYou)setTimeout(aiAction,600);
      break;
  }
  item.usesLeft--;
  if(item.usesLeft<=0)G.activeItems.splice(idx,1);
  else G.activeItems[idx]=item;
  renderActiveItems();
  unlockAchievement('use_active_item');
  if(G.activeItems.length>=3)unlockAchievement('active_items_3');
}

function cardHTML(card,faceDown,wild,ghost,isCurse){
  if(!card)return'<div class="card-slot">—</div>';
  if(faceDown)return'<div class="card face-down"></div>';
  if(isCurse)return`<div class="card curse-card"><div class="card-rank" style="font-size:18px;">✕</div><div class="card-suit">?</div></div>`;
  let isW=wild&&G.modParams.wildcards&&G.modParams.wildcards.includes(card.rank);
  let isWI=card.wildInstinct; // Wild Instinct upgrade wild card
  let cls='card '+(isRed(card.suit)?'red':'black')+(isW?' wild':'')+(isWI?' wild-instinct':'');
  let r=ghost==='rank'?'?':card.rank,s=ghost==='suit'?'?':card.suit;
  let wiTag=isWI?'<div class="wi-tag">★ WILD</div>':'';
  return`<div class="${cls}"><div class="card-corner">${r}<br>${s}</div><div class="card-rank">${r}</div><div class="card-suit">${s}</div><div class="card-corner br">${r}<br>${s}</div>${wiTag}</div>`;
}

function renderCommunity(){
  let el=document.getElementById('community-cards');if(!el)return;
  let html='';
  // Curse community blind: per-card probability based on curse level
  // Each community card has a (totalCurse/100) chance of being hidden
  let curseCardChance=0;
  if(G.curseCommunityBlind&&G.totalCurse>0){
    curseCardChance=Math.min(0.9,G.totalCurse/100); // 10 curse=10%, 60 curse=60%, max 90%
    // Seed per-round so cards don't flicker on re-render
    if(!G.curseBlindSeed)G.curseBlindSeed=Math.random();
  }
  for(let i=0;i<5;i++){
    if(i<G.community.length){
      let fd=G.modParams.blindFlop&&G.street==='flop'&&i<3;
      // Apply per-card curse blindness (seeded per round)
      if(!fd&&curseCardChance>0&&G.street!=='showdown'){
        let cardSeed=(G.curseBlindSeed*(i+1)*137.5)%1;
        if(cardSeed<curseCardChance)fd=true;
      }
      if(!G.ghostSet&&G.modParams.ghostCard){G.ghostSide=Math.random()>0.5?'rank':'suit';G.ghostSet=true;}
      let gs=(G.modParams.ghostCard&&G.ghostSet&&i===2&&G.street!=='preflop')?G.ghostSide:null;
      html+=cardHTML(G.community[i],fd,true,gs);
    }else html+='<div class="card-slot">—</div>';
  }
  el.innerHTML=html;
}

function renderPlayers(){
  let row=document.getElementById('players-row');if(!row)return;
  row.innerHTML=G.players.map((p,i)=>{
    let n=G.players.length,sbIdx=(G.dealerIdx+1)%n,bbIdx=(G.dealerIdx+2)%n;
    let badges=(i===G.dealerIdx?'<span class="blind-badge dealer">D</span>':'')+(i===sbIdx?'<span class="blind-badge sb">SB</span>':'')+(i===bbIdx?'<span class="blind-badge bb">BB</span>':'');
    let statusText=p.folded?'FOLDED':(p.allIn?'ALL IN':(i===G.toAct&&G.phase==='betting'?'▶ TO ACT':''));
    let statusCls=p.folded?'msg-bad':(p.allIn?'msg-chaos':'msg-you');
    let cardsHTML='';
    if(p.isYou){
      if(G.modParams.blindHole&&G.street!=='showdown'){
        cardsHTML=p.cards.map(()=>cardHTML(null,true)).join('');
      }else if(G.discardPhase){
        cardsHTML=p.cards.map((c,ci)=>`<div onclick="discardCard(${ci})" style="cursor:pointer;position:relative;">${cardHTML(c,false,true)}<div style="position:absolute;top:-5px;right:-5px;background:#d00;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:bold;">×</div></div>`).join('');
      }else if(hasUpgrade('blindFaith')){
        cardsHTML=p.cards.map(()=>cardHTML(null,true)).join('');
      }else{
        cardsHTML=p.cards.map((c,ci)=>{let isCurse=G.curseCards.includes(ci);return cardHTML(c,false,true,null,isCurse);}).join('');
      }
    }else{
      if(G.street==='showdown'&&!p.folded){cardsHTML=p.cards.map(c=>cardHTML(c,false,true)).join('');}
      else if(G.curseSeeActive){cardsHTML=p.cards.map(c=>cardHTML(c,false,true)).join('');}
      else if(G.peekedPlayer===-2){cardsHTML=p.cards.map(c=>cardHTML(c,false,true)).join('');}
      else if(G.peekedPlayer===i&&G.peekedCard!==null){cardsHTML=p.cards.map((c,ci)=>ci===G.peekedCard?cardHTML(c,false):cardHTML(null,true)).join('');}
      else if(hasUpgrade('cardSharp')&&G.usedPeek&&G.peekedPlayer===i){cardsHTML=p.cards.map(c=>cardHTML(c,false,true)).join('');}
      else{cardsHTML=p.cards.map(()=>'<div class="card face-down"></div>').join('');}
    }
    let handLabel='';
    if(G.street==='showdown'&&!p.folded&&p.cards.length>=2){
      let all=applyWildcards([...p.cards,...G.community],G.modParams.wildcards);
      if(G.modParams.cursedAces)all=all.map(c=>c.rank==='A'?{...c,val:1}:c);
      let hr=handRank(all);handLabel=HAND_NAMES[hr?hr[0]:0]||'';
    }
    let panelCls=`player-panel${p.isYou?' you':''}${p.folded?' folded':''}${p.winner?' winner':''}${p.isBoss?' boss-panel':''}`;
    let la=p.lastAction||'',laCls='pla-check';
    if(la.startsWith('Fold')||la==='Safety Fold')laCls='pla-fold';
    else if(la.startsWith('Call'))laCls='pla-call';
    else if(la.startsWith('Raise'))laCls='pla-raise';
    else if(la.includes('All In'))laCls='pla-allin';
    let bossTag = p.isBoss&&G.currentBoss?`<span style="font-size:7px;letter-spacing:1.5px;color:var(--red);background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);border-radius:3px;padding:1px 5px;margin-left:4px;font-family:'DM Sans',sans-serif;font-weight:600;">BOSS</span>`:'';
    return`<div class="${panelCls}" id="player-${i}">
      <div class="player-name${p.isYou?' you-label':(p.isBoss?' boss-label':'')}">${p.name}${badges}${bossTag}</div>
      <div class="player-chips">$${p.chips}</div>
      <div class="player-bet">${p.bet>0?'Bet: $'+p.bet:''}</div>
      <div class="player-status ${statusCls}">${statusText}</div>
      ${la?`<div class="player-last-action ${laCls}">${la}</div>`:'<div style="min-height:13px"></div>'}
      <div class="player-cards">${cardsHTML}</div>
      ${handLabel?`<div class="player-hand-label">${handLabel}</div>`:''}
    </div>`;
  }).join('');
}

let chipRainInterval=null;
const CHIP_COLORS=['#c0392b','#2980b9','#27ae60','#8e44ad','#d4a843'];
function startChipRain(){
  let canvas=document.getElementById('chip-canvas');if(!canvas)return;
  let ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  let chips=[];
  for(let i=0;i<40;i++)chips.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,vy:1+Math.random()*2,vr:0.03*(Math.random()>0.5?1:-1),r:Math.random()*Math.PI*2,size:8+Math.random()*8,col:CHIP_COLORS[Math.floor(Math.random()*CHIP_COLORS.length)]});
  if(chipRainInterval)clearInterval(chipRainInterval);
  chipRainInterval=setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let c of chips){
      c.y+=c.vy;c.r+=c.vr;
      if(c.y>canvas.height+20){c.y=-20;c.x=Math.random()*canvas.width;}
      ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.r);
      ctx.beginPath();ctx.ellipse(0,0,c.size,c.size*0.35,0,0,Math.PI*2);
      ctx.fillStyle=c.col+'88';ctx.fill();
      ctx.strokeStyle=c.col;ctx.lineWidth=1.5;ctx.stroke();
      ctx.restore();
    }
  },33);
}
function stopChipRain(){if(chipRainInterval){clearInterval(chipRainInterval);chipRainInterval=null;}let canvas=document.getElementById('chip-canvas');if(canvas)canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);}

// ════════════════════════════════════════════════════════════
// INIT ROUND
// ════════════════════════════════════════════════════════════
function initRound(){
  G.street='preflop';G.pot=0;G.community=[];G.river2=null;
  G.peekedCard=null;G.peekedPlayer=null;
  G.usedSafetyNet=false;G.usedPeek=false;G.usedLuckyDraw=false;G.mulliganUsed=false;
  G.discardPhase=false;G.riverRouletteCount=0;
  G.streetActed=new Set();G.ghostSet=false;G.ghostSide=null;
  G.daredevilMustCall=false;G.shopPurchasedThisVisit=false;G.shopActiveItemPurchased=false;
  G.cardDealLocked=false;G.raiseCount=0;G.playerAllInCount=0;
  G.curseCards=[];G.curseBlindSeed=Math.random();

  // Track mods for codex
  let playerData=loadPD();

  // Pick modifier
  if(G.isBossFight&&G.currentBoss){
    // Boss: lock modifier for entire fight (set once, reuse after)
    if(!G.bossMod){
      let bm=G.currentBoss.mods;
      let bmId=bm[Math.floor(Math.random()*bm.length)];
      G.bossMod=CHAOS_MODS.find(m=>m.id===bmId)||CHAOS_MODS[0];
    }
    G.currentMod=G.bossMod;
  }else{
    G.bossMod=null; // clear on non-boss rounds
    let pool=[...CHAOS_MODS];
    if(G.round<=2)pool=pool.filter(m=>m.id==='normal'||Math.random()>0.45);
    if(hasUpgrade('chaosPick')){let opts=shuffle(pool).slice(0,2);G.currentMod=opts[0];}
    else G.currentMod=pool[Math.floor(Math.random()*pool.length)];
  }
  G.modParams=G.currentMod.apply();
  // Roll lucky/curse traits (stacks on top of base modifier)
  G.activeLuckyTrait=null;
  G.activeCurseTrait=null;
  if(!G.isBossFight){
    let lt=rollLuckyTrait();
    if(lt){G.activeLuckyTrait=lt;lt.apply(G.modParams);log('Lucky Modifier: '+lt.name+' — '+lt.desc,'chaos');}
    let ct=rollCurseTrait();
    if(ct){G.activeCurseTrait=ct;ct.apply(G.modParams);log('Cursed Modifier: '+ct.name+' — '+ct.desc,'bad');}
  }
  if(!G.runModsSeen)G.runModsSeen=[];
  if(G.currentMod.id!=='normal'){G.runModsSeen.push(G.currentMod.id);}
  // Update codex
  if(!playerData.codexMods.includes(G.currentMod.id)){playerData.codexMods.push(G.currentMod.id);savePD(playerData);}

  // Build deck
  let deck=makeDeck();
  if(G.modParams.suitBan)deck=deck.filter(c=>c.suit!==G.modParams.suitBan);
  if(G.modParams.removedRanks)deck=deck.filter(c=>!G.modParams.removedRanks.includes(c.rank));
  if(G.modParams.onlyRed)deck=deck.filter(c=>isRed(c.suit));
  if(G.modParams.cursedAces)deck=deck.map(c=>c.rank==='A'?{...c,val:1}:c);
  G.deck=shuffle(deck);

  // Players
  let numAI=G.isBossFight?1:(G.modParams.headsUp?1:3);
  const aiNames=shuffle(AI_NAMES).slice(0,numAI);
  G.youIdx=numAI; // Player always last (rightmost)
  G.dealerIdx=Math.floor(Math.random()*(numAI+1));
  G.players=[];
  // Ensure G.chips is sane — if 0 or negative something went wrong, give minimum
  if(G.chips<=0)G.chips=Math.max(G.chips,getBlind('bb')*2)||20;
  for(let i=0;i<numAI+1;i++){
    if(i===G.youIdx){
      let stack=G.chips;
      if(hasUpgrade('fatWallet'))stack+=50;
      if(hasUpgrade('bigLeague')){stack=Math.max(0,stack-15);G.chips=stack;log(' Big League entry fee: -$15','chaos');}
      if(hasUpgrade('snakeEyes')){if(Math.random()>0.5){stack+=80;log(' Snake Eyes: HEADS! +$80','win');}else{stack=Math.max(0,stack-40);log(' Snake Eyes: TAILS! -$40','bad');}}
      if(hasUpgrade('daredevil'))G.daredevilMustCall=true;
      let _pname=(function(){try{let _pd=JSON.parse(localStorage.getItem('chaosHoldemPD')||'{}');return _pd.playerName||'YOU';}catch(e){return 'YOU';}})();
      G.players.push({name:_pname,chips:stack,bet:0,totalBet:0,cards:[],folded:false,isYou:true,allIn:false,lastAction:''});
    }else{
      let ai=aiNames.shift();
      let aiChips=G.isBossFight?G.currentBoss.startChips:(600+Math.floor(Math.random()*600));
      G.players.push({name:ai,chips:aiChips,bet:0,totalBet:0,cards:[],folded:false,isYou:false,allIn:false,lastAction:'',isBoss:G.isBossFight});
    }
  }

  // Apply chip rain
  if(G.modParams.chipRain){for(let p of G.players){p.chips+=G.modParams.chipRain;}log(` Chip Rain! Everyone +$${G.modParams.chipRain}`,'chaos');}
  if(G.modParams.megaPot){for(let p of G.players){let a=Math.min(50,p.chips);p.chips-=a;G.pot+=a;}log(' Mega Pot! Everyone antes $50','chaos');}
  if(G.modParams.oracleFlop){for(let i=0;i<3;i++)G.community.push(G.deck.pop());log(' Oracle Flop: Community revealed before betting!','chaos');}

  let holeCount=G.modParams.extraHole?3:2;
  for(let h=0;h<holeCount;h++){for(let p of G.players)p.cards.push(G.deck.pop());}

  // LOCK CARDS after deal — prevents menu reload exploit
  G.cardDealLocked=true;

  // Wild Instinct upgrade: one random card in player's hand is wild
  G.wildInstinctIdx=null;
  if(hasUpgrade('wildCard')){
    let you=G.players[G.youIdx];
    if(you&&you.cards.length>0){
      G.wildInstinctIdx=Math.floor(Math.random()*you.cards.length);
      you.cards[G.wildInstinctIdx]={...you.cards[G.wildInstinctIdx],wild:true,wildInstinct:true};
      log('Wild Instinct! Card '+(G.wildInstinctIdx+1)+' is wild this round.','chaos');
    }
  }

  // Curse cards
  let pd3=loadPD();
  if(G.modParams.cursedExtraCard&&you.cards.length>0){
    let extraCurseIdx=Math.floor(Math.random()*you.cards.length);
    if(!G.curseCards.includes(extraCurseIdx))G.curseCards.push(extraCurseIdx);
    log(' Corruption! Extra curse card!','bad');
  }
  if(G.totalCurse>0){
    let curseChance=G.totalCurse/100;
    if(Math.random()<curseChance){
      let youCards=G.players[G.youIdx].cards;
      if(youCards.length>0){
        let ci=Math.floor(Math.random()*youCards.length);
        G.curseCards=[ci];
        log(` Curse activated! One of your cards is cursed.`,'bad');
      }
    }
    // Curse oracle: see all hands
    // curseSee: persistent ability set in buyUpgrade

  }

  // Suit bonus
  if(hasUpgrade('suitedBonus')){let you=G.players[G.youIdx];if(you.cards.length>=2&&you.cards[0].suit===you.cards[1].suit){G.pot+=20;log('️ Suit Up! Suited hole cards — +$20 to pot','chaos');}}

  // AI discard for extraHole
  if(G.modParams.extraHole){
    for(let p of G.players){
      if(!p.isYou&&p.cards.length===3){
        let di=0;let s01=p.cards[0].suit===p.cards[1].suit,s02=p.cards[0].suit===p.cards[2].suit,s12=p.cards[1].suit===p.cards[2].suit;
        if(s01&&!s12)di=2;else if(s02&&!s01)di=1;else if(s12&&!s01)di=0;
        else{let mn=Math.min(p.cards[0].val,p.cards[1].val,p.cards[2].val);di=p.cards.findIndex(c=>c.val===mn);}
        p.cards.splice(di,1);
      }
    }
    G.discardPhase=true;log('Bonus Card: Click one of YOUR cards to discard.','chaos');
  }

  // Blinds
  let n=G.players.length;
  let sbIdx=(G.dealerIdx+1)%n,bbIdx=(G.dealerIdx+2)%n;
  let sb=getBlind('sb'),bb=getBlind('bb');
  if(G.modParams.doubleBlinds){sb*=2;bb*=2;}
  postBlind(sbIdx,sb);postBlind(bbIdx,bb);
  G.currentBet=bb;
  G.toAct=(G.dealerIdx+3)%n;
  G.actionsLeft=n;
  G.streetActed=new Set();

  setTimeout(()=>sfx('deal'),80);setTimeout(()=>sfx('deal'),200);setTimeout(()=>sfx('deal'),320);
  log(`— Hand ${G.round} · ${G.currentMod.name} —`,'chaos');
  G.handsPlayedThisRun++;

  // Countdown upgrade
  if(hasUpgrade('countdown'))startCountdown();

  G.phase=G.discardPhase?'discard':'betting';
  rebuildAppHTML();applyTableStyle();renderAll();
  if(!G.discardPhase){
    if(G.players[G.toAct].isYou)renderActions();
    else setTimeout(aiAction,800);
  }
}

function postBlind(idx,amount){let p=G.players[idx];let a=Math.min(amount,p.chips);p.chips-=a;p.bet+=a;p.totalBet+=a;G.pot+=a;if(p.chips===0)p.allIn=true;}

// ════════════════════════════════════════════════════════════
let countdownInterv=null;let countdownSec=10;
function startCountdown(){
  clearCountdown();
  countdownSec=10;
  let ring=document.createElement('div');ring.id='countdown-ring';ring.className='countdown-ring';
  ring.innerHTML=`<svg width="52" height="52" viewBox="0 0 52 52"><circle class="ring-bg" cx="26" cy="26" r="22"/><circle class="ring-fg" id="ring-arc" cx="26" cy="26" r="22" style="stroke-dashoffset:0"/></svg><div class="countdown-number" id="cd-num">10</div>`;
  document.body.appendChild(ring);
  countdownInterv=setInterval(()=>{
    countdownSec--;
    let el=document.getElementById('cd-num');if(el)el.textContent=countdownSec;
    let arc=document.getElementById('ring-arc');
    if(arc){let pct=(countdownSec/10)*100;arc.style.strokeDashoffset=100-pct;arc.style.stroke=countdownSec<=3?'var(--red)':'var(--chaos)';}
    if(countdownSec<=0){
      clearCountdown();
      let you=G.players[G.youIdx];
      if(you&&!you.folded&&!you.allIn&&G.phase==='betting'&&G.players[G.toAct]?.isYou){
        log('⏱ Time\'s up! Auto-fold!','bad');playerAction('fold');
      }
    }
  },1000);
}
function clearCountdown(){if(countdownInterv){clearInterval(countdownInterv);countdownInterv=null;}let r=document.getElementById('countdown-ring');if(r)r.remove();}

// ════════════════════════════════════════════════════════════
function renderActions(){
  clearCountdown();
  let btns=document.getElementById('action-buttons');if(!btns)return;
  let you=G.players[G.youIdx];
  if(!you||you.folded||you.allIn||G.phase!=='betting'){btns.innerHTML='';return;}
  let callAmt=Math.max(0,G.currentBet-you.bet);
  let canCheck=callAmt<=0;
  let allInOnly=G.modParams.allInOnly;
  let noCheck=G.modParams.noCheck;
  let cantFold=hasUpgrade('allOrNothing')||(hasUpgrade('daredevil')&&G.street==='preflop');
  let html='';
  if(!cantFold)html+=`<button class="btn btn-fold" onclick="playerAction('fold')">FOLD <span class="kbd">F</span></button>`;
  if(allInOnly){
    if(canCheck&&!noCheck)html+=`<button class="btn btn-check" onclick="playerAction('check')">CHECK <span class="kbd">C</span></button>`;
    html+=`<button class="btn btn-allin" onclick="playerAction('allin')">ALL IN $${you.chips} <span class="kbd">A</span></button>`;
  }else{
    if(canCheck&&!noCheck)html+=`<button class="btn btn-check" onclick="playerAction('check')">CHECK <span class="kbd">C</span></button>`;
    else if(!canCheck){let a=Math.min(callAmt,you.chips);html+=`<button class="btn btn-call" onclick="playerAction('call')">CALL $${a} <span class="kbd">C</span></button>`;}
    if(you.chips>callAmt)html+=`<button class="btn btn-raise" onclick="openRaise()">RAISE <span class="kbd">R</span></button>`;
    html+=`<button class="btn btn-allin" onclick="playerAction('allin')">ALL IN $${you.chips} <span class="kbd">A</span></button>`;
  }
  if(hasUpgrade('safetyNet')&&!G.usedSafetyNet&&G.street==='flop')html+=`<button class="btn btn-chaos" onclick="playerAction('safetyfold')">🛡 SAFETY FOLD</button>`;
  if(hasUpgrade('tellReader')&&!G.usedPeek&&G.street==='preflop')html+=`<button class="btn btn-chaos" onclick="usePeek()">🔍 PEEK</button>`;
  if(hasUpgrade('luckyDraw')&&!G.usedLuckyDraw&&G.street==='preflop')html+=`<button class="btn btn-chaos" onclick="useLuckyDraw()">🍀 SWAP HAND</button>`;
  if(G.modParams.mulligan&&!G.mulliganUsed&&G.street==='flop')html+=`<button class="btn btn-chaos" onclick="useMulligan()">🔁 MULLIGAN</button>`;
  btns.innerHTML=html;
  setupRaiseUI();
  if(hasUpgrade('countdown'))startCountdown();
}

function confirmAllIn(btn,chips){
  if(btn.dataset.confirmed==='1'){playerAction('allin');return;}
  btn.dataset.confirmed='1';
  btn.textContent='ARE YOU SURE? ($'+chips+')';
  btn.classList.add('btn-allin-confirm');
  // Auto-reset after 3s if not confirmed
  setTimeout(()=>{
    if(btn.dataset.confirmed==='1'){btn.dataset.confirmed='0';btn.textContent='ALL IN $'+chips+' ';btn.classList.remove('btn-allin-confirm');let kbd=document.createElement('span');kbd.className='kbd';kbd.textContent='A';btn.appendChild(kbd);}
  },3000);
}
function setupRaiseUI(){
  let you=G.players[G.youIdx];if(!you)return;
  let rc=document.getElementById('raise-control');if(!rc)return;
  let minR=Math.max(G.currentBet+getBlind('bb'),you.bet+getBlind('bb'));
  let maxR=you.chips+you.bet;
  minR=Math.min(minR,maxR);
  let inp=document.getElementById('raise-input');
  if(inp){inp.min=minR;inp.max=maxR;inp.value=minR;updateRaiseDisplay();}
}
function updateRaiseDisplay(){
  let inp=document.getElementById('raise-input');if(!inp)return;
  let you=G.players[G.youIdx];if(!you)return;
  let val=parseInt(inp.value)||0;
  let max=you.chips+you.bet;
  val=Math.max(parseInt(inp.min)||0,Math.min(val,max));
  inp.value=val;
  let cb=document.getElementById('raise-confirm-btn');if(cb)cb.textContent=`✓ RAISE TO $${val}`;
}
function adjustRaise(delta){
  let inp=document.getElementById('raise-input');if(!inp)return;
  let you=G.players[G.youIdx];if(!you)return;
  let step=delta*getBlind('bb');
  let cur=parseInt(inp.value)||0;
  let max=you.chips+you.bet;
  inp.value=Math.max(parseInt(inp.min)||0,Math.min(cur+step,max));
  updateRaiseDisplay();
}
function setRaisePreset(pct){
  let you=G.players[G.youIdx];if(!you)return;
  let inp=document.getElementById('raise-input');if(!inp)return;
  let pot=G.pot;let val=Math.floor(pot*(pct/100));
  let max=you.chips+you.bet;
  val=Math.max(parseInt(inp.min)||0,Math.min(val,max));
  inp.value=val;updateRaiseDisplay();
}
function openRaise(){
  let rc=document.getElementById('raise-control');if(!rc)return;
  rc.classList.remove('hidden');setupRaiseUI();
}

function usePeek(){G.usedPeek=true;let targets=G.players.filter((p,i)=>!p.isYou&&!p.folded);if(!targets.length){log('No opponents to peek!','bad');return;}let target=targets[Math.floor(Math.random()*targets.length)];G.peekedPlayer=G.players.indexOf(target);G.peekedCard=0;log(` Peeked at ${target.name}'s first card!`,'chaos');renderPlayers();}
function useLuckyDraw(){G.usedLuckyDraw=true;let you=G.players[G.youIdx];you.cards=[G.deck.pop(),G.deck.pop()];G.curseCards=[];log(' Lucky Draw! New hole cards dealt.','chaos');renderPlayers();}
function useMulligan(){G.mulliganUsed=true;let you=G.players[G.youIdx];let idx=Math.floor(Math.random()*you.cards.length);you.cards[idx]=G.deck.pop();G.curseCards=G.curseCards.filter(c=>c!==idx);log(` Mulligan! Card ${idx+1} replaced.`,'chaos');renderPlayers();}

function playerAction(action){
  initAudio();clearCountdown();
  let you=G.players[G.youIdx];
  let ab=document.getElementById('action-buttons');if(ab)ab.innerHTML='';
  let rc=document.getElementById('raise-control');if(rc)rc.classList.add('hidden');

  if(action==='fold'){
    sfx('fold');you.folded=true;you.bet=0;you.lastAction='Folded';
    if(hasUpgrade('greedChip')){you.chips=Math.max(0,you.chips-40);log(' Greed Chip fold penalty: -$40','bad');}
    log('YOU folded.','bad');advanceAction();
  }else if(action==='check'){
    sfx('check');you.lastAction='Checked';log('YOU checked.','you');you.bet=0;advanceAction();
  }else if(action==='call'){
    sfx('call');let amt=Math.min(G.currentBet-you.bet,you.chips);
    you.chips-=amt;G.pot+=amt;you.totalBet+=amt;you.bet+=amt;
    if(you.chips===0){you.allIn=true;you.lastAction='All In';sfx('allin');log('YOU are ALL IN!','chaos');}
    else{you.lastAction=`Called $${amt}`;log(`YOU called $${amt}.`,'you');}
    advanceAction();
  }else if(action==='allin'){
    sfx('allin');let amt=you.chips;you.totalBet+=amt;you.bet+=amt;G.pot+=amt;you.chips=0;you.allIn=true;
    you.lastAction=`All In $${you.bet}`;
    if(you.bet>G.currentBet){G.currentBet=you.bet;G.streetActed=new Set([G.youIdx]);}
    log(`YOU went ALL IN for $${you.bet}!`,'you');G.playerAllInCount=(G.playerAllInCount||0)+1;advanceAction();
  }else if(action==='raise'){
    sfx('raise');let inp=document.getElementById('raise-input');
    let raiseTo=parseInt(inp?.value||G.currentBet*2);
    let extra=Math.min(raiseTo-you.bet,you.chips);
    you.chips-=extra;you.totalBet+=extra;you.bet+=extra;G.pot+=extra;
    G.currentBet=you.bet;if(you.chips===0)you.allIn=true;
    G.streetActed=new Set([G.youIdx]);
    you.lastAction=`Raised $${you.bet}`;log(`YOU raised to $${you.bet}.`,'you');advanceAction();
  }else if(action==='safetyfold'){
    sfx('fold');G.usedSafetyNet=true;you.lastAction='Safety Fold';
    let refund=you.bet;G.pot-=refund;you.chips+=refund;you.folded=true;
    log(' Safety Net: folded after flop, bet refunded.','chaos');advanceAction();
  }
  G.chips=you.chips;renderStats();
}

// ════════════════════════════════════════════════════════════
// ADVANCE ACTION
// ════════════════════════════════════════════════════════════
function advanceAction(){
  let activePlayers=G.players.filter(p=>!p.folded&&!p.allIn);
  let active=G.players.filter(p=>!p.folded);
  if(active.length===1){awardPot(active);return;}
  // If nobody can act (all all-in or one left), run out the board
  if(activePlayers.length===0){setTimeout(nextStreet,700);return;}
  if(!G.streetActed)G.streetActed=new Set();
  G.streetActed.add(G.toAct);
  let allSquared=activePlayers.every(p=>p.bet===G.currentBet);
  let everyoneActed=activePlayers.every(p=>G.streetActed.has(G.players.indexOf(p)));
  // Safety: if raise count exceeded cap, force street end regardless
  if(!G.raiseCount)G.raiseCount=0;
  if(allSquared&&everyoneActed){G.raiseCount=0;nextStreet();return;}
  // Hard safety — if somehow stuck after too many actions, move on
  if(G.streetActed.size>G.players.length*4){G.raiseCount=0;setTimeout(nextStreet,700);return;}
  let iters=0;
  do{
    G.toAct=(G.toAct+1)%G.players.length;iters++;
    if(iters>G.players.length){G.raiseCount=0;setTimeout(nextStreet,700);return;}
  }while(G.players[G.toAct].folded||G.players[G.toAct].allIn);
  renderAll();
  if(G.players[G.toAct].isYou)renderActions();
  else setTimeout(aiAction,700+Math.random()*500);
}

// ════════════════════════════════════════════════════════════
// AI ACTION
// ════════════════════════════════════════════════════════════
function aiAction(){
  let p=G.players[G.toAct];if(!p||p.folded||p.allIn){advanceAction();return;}
  let callAmt=Math.max(0,G.currentBet-p.bet);
  let potOdds=G.pot>0?callAmt/(G.pot+callAmt):1;
  let strength=Math.random();
  if(G.community.length>=3){
    let allC=[...p.cards,...G.community];
    let hr=handRank(applyWildcards(allC,G.modParams.wildcards));
    strength=Math.min(0.95,(hr?hr[0]/8:0)+Math.random()*0.3);
  }
  if(G.modParams.lowWins)strength=1-strength;
  if(hasUpgrade('ironNerves'))strength=Math.max(0,strength-0.15);
  // Boss: harder AI
  if(p.isBoss)strength=Math.min(0.99,strength+0.2);
  if(G.modParams.luckyAIWeaken)strength=Math.max(0,strength-0.15);
  if(G.modParams.cursedAIStrengthen)strength=Math.min(0.99,strength+0.15);

  // Boss special: Phil Hellmuth goes all-in on premium pairs
  if(p.isBoss&&G.currentBoss?.id==='phil'&&p.cards.length>=2){
    let c0=p.cards[0],c1=p.cards[1];
    if(c0.val>=11&&c0.rank===c1.rank)strength=0.98;
  }

  let action='fold';
  // ALL-IN EXPLOIT FIX:
  // Track how many times the player has gone all-in this round
  if(!G.playerAllInCount)G.playerAllInCount=0;
  let isAllinBet=callAmt>=p.chips*0.4; // big bet relative to AI stack
  let potOddsGood=potOdds<0.38;
  // After 2+ player all-ins, AIs become much harder to bluff out
  let exploitGuard=G.playerAllInCount>=2?0.55:0; // baseline call threshold rises

  if(callAmt<=0){
    action=(strength>0.7&&Math.random()>0.5&&(G.raiseCount||0)<3)?'raise':'check';
  }
  else if(isAllinBet&&(potOddsGood||strength>0.35+exploitGuard)){
    // Force call when pot odds are good OR when exploit guard triggers
    action=strength>0.2+exploitGuard?'call':'fold';
  }
  else if(strength>potOdds+0.2){
    action=(strength>0.8&&Math.random()>0.6&&(G.raiseCount||0)<3)?'raise':'call';
  }
  else if(callAmt<=getBlind('bb')*2&&Math.random()>0.4){action='call';}
  // Hard rule: if player all-in'd 3+ times this round, always call on good hand
  if(G.playerAllInCount>=3&&strength>0.4&&action==='fold'){action='call';}
  if(G.modParams.allInOnly){
    if(action==='raise'||action==='call')action=Math.random()>0.4?'allin':'fold';
    else if(action==='check')action=Math.random()>0.6?'allin':'check';
  }
  if(G.modParams.noCheck&&action==='check')action=Math.random()>0.5?'call':'fold';
  if(p.isBoss&&G.currentBoss?.id==='doyle'){
    let c0=p.cards[0];if(c0&&(c0.rank==='10'||c0.rank==='2'))action='allin';
  }

  if(action==='fold'){sfx('aifold');p.folded=true;p.lastAction='Folded';log(p.name+' folded.');}
  else if(action==='check'){sfx('check');p.lastAction='Checked';log(`${p.name} checked.`);p.bet=0;}
  else if(action==='call'){
    sfx('aicall');let amt=Math.min(callAmt,p.chips);p.chips-=amt;p.bet+=amt;p.totalBet+=amt;G.pot+=amt;
    if(p.chips===0){p.allIn=true;p.lastAction='All In';log(`${p.name} called all-in!`,'chaos');}
    else{p.lastAction=`Called $${amt}`;log(`${p.name} called $${amt}.`);}
  }else if(action==='raise'){
    sfx('raise');let rt=Math.min(G.currentBet*2+getBlind('bb'),p.chips+p.bet);
    let ex=Math.min(rt-p.bet,p.chips);p.chips-=ex;p.bet+=ex;p.totalBet+=ex;G.pot+=ex;G.currentBet=p.bet;
    if(p.chips===0)p.allIn=true;G.streetActed=new Set([G.players.indexOf(p)]);
    G.raiseCount=(G.raiseCount||0)+1;
    p.lastAction=`Raised $${p.bet}`;log(`${p.name} raised to $${p.bet}.`);
  }else if(action==='allin'){
    sfx('allin');let amt=p.chips;p.totalBet+=amt;p.bet+=amt;G.pot+=amt;p.chips=0;p.allIn=true;
    if(p.bet>G.currentBet){G.currentBet=p.bet;G.streetActed=new Set([G.players.indexOf(p)]);}
    p.lastAction=`All In $${p.bet}`;log(`${p.name} went ALL IN for $${amt}!`,'chaos');
  }
  advanceAction();
}

// ════════════════════════════════════════════════════════════
// STREETS
// ════════════════════════════════════════════════════════════
function nextStreet(){
  for(let p of G.players){p.bet=0;p.lastAction='';}
  G.currentBet=0;G.streetActed=new Set();G.raiseCount=0;
  let active=G.players.filter(p=>!p.folded);
  if(active.length===1){awardPot(active);return;}
  if(G.street==='preflop'){
    G.street='flop';sfx('newstreet');
    if(!G.modParams.oracleFlop)for(let i=0;i<3;i++)G.community.push(G.deck.pop());
    if(G.modParams.spinBlinds){G.currentBet=getBlind('bb')*2;log(' Blinds spinning! Min $'+G.currentBet,'chaos');}
    if(G.modParams.blindFlop)log(' Blind Flop: bet without seeing! Reveals on turn.','chaos');
    log('— FLOP —');
  }else if(G.street==='flop'){
    G.street='turn';sfx('newstreet');G.community.push(G.deck.pop());
    if(G.modParams.blindFlop)log('Blind Flop revealed!','chaos');
    if(G.modParams.spinBlinds)G.currentBet=getBlind('bb')*4;
    log('— TURN —');
  }else if(G.street==='turn'){
    G.street='river';sfx('newstreet');G.community.push(G.deck.pop());
    if(G.modParams.twoRivers){G.river2=G.deck.pop();log(` Two Rivers! Alt: ${G.river2.rank}${G.river2.suit}`,'chaos');}
    if(G.modParams.riverRoulette){
      let rc2=0;let redraw=()=>{if(rc2<2){rc2++;G.community[G.community.length-1]=G.deck.pop();log('River Roulette! Redraw ('+(rc2)+'/3)','chaos');setTimeout(redraw,600);}else renderAll();};setTimeout(redraw,600);
    }
    if(G.modParams.spinBlinds)G.currentBet=getBlind('bb')*8;
    log('— RIVER —');
  }else if(G.street==='river'){showdown();return;}

  let si=(G.dealerIdx+1)%G.players.length,sc=0;G.toAct=si;
  while((G.players[G.toAct].folded||G.players[G.toAct].allIn)&&sc<G.players.length){G.toAct=(G.toAct+1)%G.players.length;sc++;}
  G.actionsLeft=G.players.filter(p=>!p.folded&&!p.allIn).length;
  if(G.players.filter(p=>!p.folded&&!p.allIn).length===0){setTimeout(nextStreet,700);return;}
  renderAll();
  if(G.players[G.toAct].isYou)renderActions();
  else setTimeout(aiAction,800);
}

// ════════════════════════════════════════════════════════════
// SHOWDOWN
// ════════════════════════════════════════════════════════════
function showdown(){
  G.street='showdown';log('— SHOWDOWN —','chaos');renderAll();
  let active=G.players.filter(p=>!p.folded);
  active.forEach(p=>{
    let all=applyWildcards([...p.cards,...G.community],G.modParams.wildcards);
    if(G.modParams.cursedAces)all=all.map(c=>c.rank==='A'?{...c,val:1}:c);
    if(G.modParams.mirrorHands)all=[...p.cards,...[...G.community].reverse()].slice(0,7);
    // Cursed cards don't apply to scoring
    if(p.isYou&&G.curseCards.length>0){all=all.filter((_,ci)=>!G.curseCards.includes(ci));}
    if(all.length<5&&p.isYou){let extra=G.community.filter((_,ci)=>true);all=[...all,...extra].slice(0,7);}
    p.handScore=handRank(all);
    p.handName=HAND_NAMES[p.handScore?p.handScore[0]:0];
    log(`${p.name}: ${p.handName}`);
    if(p.isYou){G.lastHand=p.handName;G.lastHandCards=[...p.cards];
      if(p.handScore&&p.handScore[0]===8)unlockAchievement('royal_flush');
    }
  });
  let winner;
  if(G.modParams.lowWins)winner=active.reduce((b,p)=>!b||compareHands(p.handScore,b.handScore)<0?p:b,null);
  else winner=active.reduce((b,p)=>!b||compareHands(p.handScore,b.handScore)>0?p:b,null);
  awardPot([winner]);
}

// ════════════════════════════════════════════════════════════
// AWARD POT
// ════════════════════════════════════════════════════════════
function awardPot(winners){
  let winner=winners[0];
  let share=Math.floor(G.pot/winners.length);
  if(G.modParams.taxRound&&!hasUpgrade('taxBreak')){let tax=Math.floor(G.pot*0.20);G.pot-=tax;share=Math.floor(G.pot/winners.length);log(` Tax Round: house takes $${tax}.`,'bad');}
  if(G.modParams.bountyRound){let you=G.players[G.youIdx];let hb=you.cards.some(c=>c.rank===G.modParams.bountyRank);if(hb&&you.folded){you.chips=Math.max(0,you.chips-30);log('Bounty fold: -$30','bad');}else if(hb&&winner.isYou){share+=60;log('Bounty win: +$60!','win');}}
  if(G.modParams.jackpot&&winner.isYou)share+=G.modParams.jackpot;
  if(winner.isYou){
    if(hasUpgrade('highRoller'))share=Math.floor(share*1.1);
    if(hasUpgrade('greedChip'))share=Math.floor(share*1.25);
    if(hasUpgrade('allOrNothing'))share=Math.floor(share*2);
    if(hasUpgrade('countdown'))share=Math.floor(share*1.15);
    if(hasUpgrade('highWater')&&winner.handScore&&winner.handScore[0]>=6)share=Math.floor(share*1.3);
    if(G.curseItems&&G.curseItems.tripleWin)share=Math.floor(share*3);
  }else{
    if(hasUpgrade('allOrNothing')){let ante=G.players[G.youIdx].totalBet||0;G.players[G.youIdx].chips=Math.max(0,G.players[G.youIdx].chips-ante);G.chips=G.players[G.youIdx].chips;}
  }
  winner.chips+=share;winner.winner=true;G.pot=0;

  if(winner.isYou){
    sfx('win');G.chips=winner.chips;G.wins++;G.winStreakCurrent++;G.consecutiveAllIns=0;
    G.wonHandThisLevel=true;G.handsSinceLastWin=0;
    if(winner.allIn)G.allInWinThisRun=true;
    log(` YOU WIN $${share}!`,'win');spawnParticles(['◆','$','★','♠','♥']);
    checkAchievements();
  }else{
    // Cursed pot protect — refund % if you lose
    if(G.modParams.luckyPotProtect){let refund=Math.floor(G.pot*G.modParams.luckyPotProtect);G.chips+=refund;if(G.players[G.youIdx])G.players[G.youIdx].chips+=refund;G.pot=Math.max(0,G.pot-refund);log(' Protected! +$'+refund+' back','chaos');}
    sfx('lose');G.chips=G.players[G.youIdx].chips;
    G.winStreakCurrent=0;G.handsSinceLastWin++;
    G.lossStreakCurrent=(G.lossStreakCurrent||0)+1;
    if(G.modParams.cursedLuckDrain){G.luck=Math.max(0,G.luck-G.modParams.cursedLuckDrain);log(' Cursed! -'+G.modParams.cursedLuckDrain+' luck','bad');}
    checkSecretBossTriggers('lossStreak',{streak:G.lossStreakCurrent});
    if(hasUpgrade('lastLaugh')){
      let you=G.players[G.youIdx];
      if(!you.folded&&winner.handScore){
        let ys=handRank(applyWildcards([...you.cards,...G.community],G.modParams.wildcards));
        if(compareHands(ys,winner.handScore)>0){you.chips+=25;G.chips+=25;log(' Last Laugh: +$25','chaos');}
      }
    }
    log(`${winner.name} wins $${share}.`,'bad');
  }
  if(hasUpgrade('martingale')){if(!winner.isYou){G.martingaleMult=Math.min(4,G.martingaleMult*2);log('Martingale: next ante x'+G.martingaleMult,'chaos');}else G.martingaleMult=1;}

  renderAll();renderMessages();
  let ab=document.getElementById('action-buttons');if(ab)ab.innerHTML='';
  setTimeout(()=>showRoundResult(winner),1000);
}

// DISCARDS
// ════════════════════════════════════════════════════════════
function discardCard(idx){
  let you=G.players[G.youIdx];you.cards.splice(idx,1);G.curseCards=G.curseCards.filter(c=>c!==idx).map(c=>c>idx?c-1:c);
  G.discardPhase=false;G.phase='betting';log('Card discarded.','chaos');
  renderAll();
  if(G.players[G.toAct].isYou)renderActions();else setTimeout(aiAction,800);
}

function saveRun(){
  let pd_sr=loadPD();
  let snap={chips:G.chips,highScore:G.highScore,round:G.round,wins:G.wins,lives:G.lives,
    playerName:pd_sr.playerName||'',
    rebuySaved:G.rebuySaved,runModsSeen:G.runModsSeen||[],martingaleMult:G.martingaleMult||1,
    winStreakCurrent:G.winStreakCurrent||0,allInWinThisRun:G.allInWinThisRun||false,
    bossesDefeated:G.bossesDefeated||[],totalCurse:G.totalCurse||0,handsPlayedThisRun:G.handsPlayedThisRun||0,
    curseSeeActive:G.curseSeeActive||false,cursePurchased:G.cursePurchased||[],
    activeItems:G.activeItems||[],
    luck:G.luck||0,hardcore:G.hardcore||false,lossStreakCurrent:G.lossStreakCurrent||0,
    curseCommunityBlind:G.curseCommunityBlind||false,
    upgrades:G.upgrades.map(u=>({id:u.id,owned:u.owned,name:u.name})),
    currentModId:G.currentMod?G.currentMod.id:null,
    isBossFight:G.isBossFight||false,currentBossId:G.currentBoss?G.currentBoss.id:null,
    savedAt:Date.now(),cardDealLocked:false};
  try{localStorage.setItem('chaosHoldemRun',JSON.stringify(snap));}catch(e){}
}
function loadRun(){try{let r=localStorage.getItem('chaosHoldemRun');return r?JSON.parse(r):null;}catch(e){return null;}}
function clearRun(){try{localStorage.removeItem('chaosHoldemRun');}catch(e){}}
function resumeRun(){
  let snap=loadRun();if(!snap)return;
  initAudio();stopChipRain();
  G.chips=snap.chips;G.highScore=snap.highScore;G.round=snap.round;G.wins=snap.wins;
  G.lives=snap.lives??3;G.rebuySaved=snap.rebuySaved;G.runModsSeen=snap.runModsSeen||[];
  G.martingaleMult=snap.martingaleMult||1;G.winStreakCurrent=snap.winStreakCurrent||0;
  G.allInWinThisRun=snap.allInWinThisRun||false;G.bossesDefeated=snap.bossesDefeated||[];
  G.totalCurse=snap.totalCurse||0;G.handsPlayedThisRun=snap.handsPlayedThisRun||0;
  G.curseSeeActive=snap.curseSeeActive||false;
  G.cursePurchased=snap.cursePurchased||[];
  G.activeItems=snap.activeItems||[];
  G.luck=snap.luck||0;G.hardcore=snap.hardcore||false;G.lossStreakCurrent=snap.lossStreakCurrent||0;
  G.curseCommunityBlind=snap.curseCommunityBlind||false;
  G.lastHand=null;G.lastHandCards=[];G.cardDealLocked=false;
  G.upgrades=JSON.parse(JSON.stringify(ALL_UPGRADES));
  for(let su of snap.upgrades){let u=G.upgrades.find(u=>u.id===su.id);if(u){u.owned=su.owned;if(su.name)u.name=su.name;}}
  // Restore saved modifier so first hand doesn't re-roll a new one
  if(snap.currentModId){
    let savedMod=CHAOS_MODS.find(function(m){return m.id===snap.currentModId;});
    if(savedMod){G.currentMod=savedMod;G.modParams=savedMod.apply?savedMod.apply():{};}
  }
  // Restore boss fight state
  if(snap.isBossFight&&snap.currentBossId){
    let savedBoss=BOSSES.find(function(b){return b.id===snap.currentBossId;});
    if(savedBoss){G.isBossFight=true;G.currentBoss=savedBoss;}
  }
  rebuildAppHTML();applyTableStyle();initRound();
}

// ════════════════════════════════════════════════════════════
// ROUND RESULT / LIVES SYSTEM
// ════════════════════════════════════════════════════════════
function showRoundResult(winner){
  // Always sync G.chips from actual player object first
  let youPlayer=G.players[G.youIdx];
  if(youPlayer)G.chips=youPlayer.chips;

  let ra=document.getElementById('result-area');
  if(ra){ra.classList.remove('hidden');ra.innerHTML=`<div class="result-text${winner.isYou?'':' lose'}">${winner.isYou?'💰 YOU WIN':'💸 YOU LOSE'}</div>`;}
  let na=document.getElementById('next-area');if(!na)return;

  // ── BOSS FIGHT RESULT (no lives, just chips) ──────────────
  if(G.isBossFight){
    let boss=G.players.find(p=>p.isBoss);
    if(winner.isYou){
      // Player won this hand. Did boss run out of chips?
      if(boss&&boss.chips<=0){
        endBossFight(true);
      }else{
        na.innerHTML=`<button class="btn btn-primary" onclick="nextRound()">NEXT HAND →</button>`;
      }
    }else{
      // Boss won this hand. Did player run out of chips?
      if(G.chips<=0){
        endBossFight(false);
      }else{
        na.innerHTML=`<button class="btn btn-primary" onclick="nextRound()">NEXT HAND →</button>`;
      }
    }
    return;
  }

  // ── NORMAL ROUND RESULT ───────────────────────────────────
  if(!winner.isYou){
    // Lost — must not have 0 chips AND lives
    G.lives--;
    renderStats();
    if(G.lives<=0){
      // Check rebuy before busting
      if(hasUpgrade('secondLife')&&!G.rebuySaved){
        G.rebuySaved=true;G.chips=300;G.players[G.youIdx].chips=300;G.lives=1;
        log('️ Second Life! Revived with $300.','chaos');
        let u=G.upgrades.find(u=>u.id==='secondLife');if(u){u.owned=false;u.name='USED UP';}
        renderStats();
        na.innerHTML=`<div style="text-align:center;padding:8px;color:var(--red);font-size:12px;letter-spacing:1px;margin-bottom:8px;">WIN A HAND TO ADVANCE — ${G.lives} LIFE LEFT</div><button class="btn btn-primary" onclick="nextRound()">PLAY AGAIN →</button>`;
        saveRun();return;
      }else if(hasUpgrade('bankrupt')&&G.chips<=0){
        G.chips=200;G.players[G.youIdx].chips=200;G.lives=1;
        if(G._bankruptcyUsed){log('Bankruptcy already used','bad');return;}G._bankruptcyUsed=true;log(' Bankruptcy bail-out! +$200.','chaos');
        renderStats();
        na.innerHTML=`<div style="text-align:center;padding:8px;color:var(--red);font-size:12px;letter-spacing:1px;margin-bottom:8px;">WIN A HAND TO ADVANCE — ${G.lives} LIFE LEFT</div><button class="btn btn-primary" onclick="nextRound()">PLAY AGAIN →</button>`;
        saveRun();return;
      }
      setTimeout(()=>showBustScreen(),800);
      return;
    }
    // Still have lives — but if 0 chips, can't continue without chips
    if(G.chips<=0){
      if(hasUpgrade('secondLife')&&!G.rebuySaved){
        G.rebuySaved=true;G.chips=300;G.players[G.youIdx].chips=300;
        log('️ Second Life! Revived with $300.','chaos');
        let u=G.upgrades.find(u=>u.id==='secondLife');if(u){u.owned=false;u.name='USED UP';}
      }else if(hasUpgrade('bankrupt')){
        G.chips=200;G.players[G.youIdx].chips=200;log(' Bankruptcy bail-out! +$200.','chaos');
      }else{
        setTimeout(()=>showBustScreen(),600);return;
      }
    }
    log(` Lost a life! ${G.lives} remaining.`,'bad');
    na.innerHTML=`<div style="text-align:center;padding:8px;color:var(--red);font-size:12px;letter-spacing:1px;margin-bottom:8px;">WIN A HAND TO ADVANCE — ${G.lives} ${G.lives===1?'LIFE':'LIVES'} LEFT</div><button class="btn btn-primary" onclick="nextRound()">PLAY AGAIN →</button>`;
    saveRun();
    return;
  }

  // Won a hand
  if(G.chips<=0){
    // Somehow won but have 0 chips (edge case — all-in win gives chips back via awardPot)
    if(hasUpgrade('secondLife')&&!G.rebuySaved){
      G.rebuySaved=true;G.chips=300;G.players[G.youIdx].chips=300;
      log('️ Second Life! Revived with $300.','chaos');
    }else if(hasUpgrade('bankrupt')){
      G.chips=200;G.players[G.youIdx].chips=200;log(' Bankruptcy bail-out! +$200.','chaos');
    }
  }
  if(winner.isYou&&G.lives<3){G.lives=Math.min(3,G.lives+1);log(' Life restored!','win');}
  renderStats();
  na.innerHTML=`<button class="btn btn-primary" onclick="nextRound()">NEXT ROUND →</button>`;
  saveRun();
}

// ════════════════════════════════════════════════════════════
// BOSS FIGHT SYSTEM
// Triggers on round 10, 20, 30... Randomized boss order.
// No lives at stake. Play until one side has no chips.
// Shops and round progression LOCKED until boss is resolved.
// ════════════════════════════════════════════════════════════
function checkSecretBossTriggers(event,data){
  if(G.isBossFight)return;
  if(!G.secretBossesTriggeredThisRun)G.secretBossesTriggeredThisRun=new Set();
  // Each secret boss can only trigger ONCE per run
  let secretBosses=BOSSES.filter(b=>b.secret
    &&!G.bossesDefeated.includes(b.id)
    &&!G.secretBossesTriggeredThisRun.has(b.id));
  for(let boss of secretBosses){
    if(boss.trigger===event){
      let fire=false;
      if(event==='bigPot')fire=(data.pot>=(data.bb||10)*10);
      else if(event==='bankruptTwo')fire=(data.count>=2);
      else if(event==='lossStreak')fire=(data.streak>=5);
      if(fire){
        G.secretBossesTriggeredThisRun.add(boss.id);
        setTimeout(()=>showBossIntro(boss),1200);
        return;
      }
    }
  }
}
function checkDuoBossTrigger(){
  if(G.isBossFight)return;
  let busted=G.players.filter(p=>!p.isYou&&p.chips<=0).length;
  if(busted>=2)checkSecretBossTriggers('bankruptTwo',{count:busted});
}
function checkBossFight(){
  // Called after G.round++ — triggers on multiples of 10
  if(G.round>0&&G.round%10===0){
    let remaining=BOSSES.filter(b=>!G.bossesDefeated.includes(b.id));
    if(remaining.length>0){
      let boss=remaining[Math.floor(Math.random()*remaining.length)];
      showBossIntro(boss);
      return true;
    }
  }
  return false;
}
function showBossIntro(boss){
  G.currentBoss=boss;G.isBossFight=true;
  let html=`<div class="boss-intro-overlay" id="boss-intro">

function tierWeight(item){
  // Common=100, Uncommon=40, Rare=15, Epic=5
  // Luck adds +25% to rare/epic weight
  let base={'common':100,'uncommon':40,'rare':15,'epic':5}[item.tier||'common']||100;
  let luckBonus=(item.tier==='rare'||item.tier==='epic')?(G.luck||0)*0.25:0;
  return Math.max(1,base+luckBonus);
}

function weightedShufflePick(pool, count){
  let out=[]; let p=[...pool];
  for(let i=0;i<count&&p.length>0;i++){
    let total=p.reduce((s,x)=>s+tierWeight(x),0);
    let r=Math.random()*total;
    let acc=0;
    for(let j=0;j<p.length;j++){
      acc+=tierWeight(p[j]);
      if(r<=acc){out.push(p[j]);p.splice(j,1);break;}
    }
  }
  return out;
}

function showShopOverlay(){
  sfx('shop');
  let notOwned=G.upgrades.filter(u=>!u.owned);
  let maxItems=3+(G.luck>=30?1:0)+(G.luck>=70?1:0);
  // Weighted pick — common most likely, epic very rare
  let available=weightedShufflePick(notOwned, maxItems);

  let items=available.length?available.map(u=>{
    let cantAfford=G.chips<u.cost;
    return`<div class="shop-item${cantAfford?' cant-afford':''}" onclick="buyUpgrade('${u.id}','normal')">
      <div class="shop-item-icon">${u.icon}</div>
      <div class="shop-item-name">${u.name}</div>
      <div class="shop-item-desc">${u.desc}</div>
      ${u.downside?`<div class="shop-item-downside">⚠️ ${u.downside}</div>`:''}
      <div class="shop-item-cost">${u.cost===0?'FREE':'$'+u.cost}</div>
    </div>`;
  }).join(''):`<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--muted)">You own everything. Legend.</div>`;

  // Active items section (1-2 random items, not already carried)
  let curseReduction=(G.totalCurse||0)/100;
  let numActive=G.totalCurse>80?(Math.random()<0.3?1:0):(Math.random()<(0.5-curseReduction*0.4)?2:1);
  let canCarryMore=(!G.activeItems||G.activeItems.length<3);
  let shopActiveItems=canCarryMore?shuffle([...ACTIVE_ITEMS].filter(a=>!(G.activeItems||[]).some(c=>c.id===a.id))).slice(0,numActive):[];
  let activeSection=shopActiveItems.length?`
    <div style="margin-top:12px;border-top:1px solid rgba(212,168,67,0.15);padding-top:12px;">
      <div style="font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;">ACTIVE ITEMS</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${shopActiveItems.map(a=>{let ca=G.chips<a.cost;return`<div id="shop-active-${a.id}" class="shop-item${ca?' cant-afford':''}" style="flex:1;min-width:120px;max-width:180px;position:relative;" onclick="buyActiveItem('${a.id}')">
          <div class="shop-item-icon">${a.icon}</div>
          <div class="shop-item-name">${a.name}</div>
          <div class="shop-item-desc">${a.desc} (${a.uses}× use)</div>
          <div class="shop-item-cost">$${a.cost}</div>
        </div>`;}).join('')}
      </div>
    </div>`:'';
  let html=`<div class="shop-panel">
    <div class="shop-title">CHAOS SHOP</div>
    <div class="shop-sub">Pick ONE upgrade — choose wisely</div>
    <div class="shop-chips">Stack: $${G.chips}</div>
    <div class="shop-grid">${items}</div>
    ${activeSection}
    <div style="display:flex;gap:8px;margin-top:14px;justify-content:center;">
      <button class="btn btn-curse" onclick="showCurseShopOverlay()">CURSE SHOP</button>
      <button class="btn btn-menu" onclick="closeShopOverlay()">SKIP SHOP</button>
    </div>
    <div style="font-size:9px;color:rgba(255,255,255,0.2);text-align:center;margin-top:8px;">Pick one upgrade OR one active item. Can't buy multiple.</div>
  </div>`;
  showOverlay(html,false);
}

function showCurseShopOverlay(){
  // Weighted curse roll — rare curses appear less often
  let pool=CURSE_SHOP_ITEMS.filter(u=>u.repeatable||!(G.cursePurchased||[]).includes(u.id));
  let available=weightedShufflePick(pool, 3);
  let items=available.map(u=>{
    return`<div class="curse-item" onclick="buyUpgrade('${u.id}','curse')">

function buyActiveItem(id){
  if(G.shopActiveItemPurchased){log('Already bought an active item this visit!','bad');return;}
  let item=ACTIVE_ITEMS.find(a=>a.id===id);if(!item)return;
  if(G.chips<item.cost){log('Not enough chips!','bad');return;}
  if((G.activeItems||[]).length>=3){log('Active item slots full!','bad');return;}
  if((G.activeItems||[]).some(a=>a.id===id)){log('Already carrying this item!','bad');return;}
  G.chips-=item.cost;
  if(!G.activeItems)G.activeItems=[];
  G.activeItems.push({...item,usesLeft:item.uses});
  G.shopActiveItemPurchased=true;
  sfx('shop');spawnParticles(['◆','★']);
  log('Got: '+item.name+'!','chaos');
  // Update shop in place — remove this item's card, don't re-roll
  let el=document.getElementById('shop-active-'+id);
  if(el){
    el.style.opacity='0.4';el.style.pointerEvents='none';
    el.innerHTML+='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);border-radius:8px;font-family:\'Bebas Neue\',sans-serif;font-size:13px;color:var(--green2);">PURCHASED</div>';
    el.style.position='relative';
  }
}
function buyUpgrade(id,type){
  if(G.shopPurchasedThisVisit){log('Already bought an upgrade this shop visit!','bad');return;}
  sfx('shop');
  if(type==='curse'){
    let u=CURSE_SHOP_ITEMS.find(u=>u.id===id);if(!u)return;
    if(!u.repeatable&&G.cursePurchased&&G.cursePurchased.includes(id)){log('Already have this curse.','bad');return;}
    if(!G.cursePurchased)G.cursePurchased=[];
    if(!u.repeatable)G.cursePurchased.push(id);
    G.totalCurse+=u.curse;
    let pd4=loadPD();pd4.totalCurseEver=(pd4.totalCurseEver||0)+u.curse;savePD(pd4);
    if(u.bonusChips){G.chips+=u.bonusChips;log(`${u.icon} ${u.name}: +$${u.bonusChips} curse bonus!`,'chaos');}
    if(u.tripleWin){G.curseItems=G.curseItems||{};G.curseItems.tripleWin=true;}
    if(u.reviveAmt){let upg=G.upgrades.find(u=>u.id==='secondLife');if(upg){upg.owned=true;upg.reviveAmt=u.reviveAmt;}}
    if(id==='curseSee'){G.curseSeeActive=true;}
    if(u.blindCommunity){G.curseCommunityBlind=true;}
    if(u.bonusLives){G.lives=Math.min(G.lives+(u.bonusLives||1),7);log('+'+u.bonusLives+' life from curse!','win');unlockAchievement('max_lives');}
    if(u.bonusXP){G._bonusCurseXP=(G._bonusCurseXP||0)+(u.bonusXP||0);}
    if(u.noFold){G.curseCantFoldThisRound=true;}
    if(u.doublePot){G.curseDoublePot=true;}
    if(u.blindHole){G.curseBlindHole=true;}
    log(u.name+' acquired. Curse grows in the dark.','bad');
    G.shopPurchasedThisVisit=true;
    spawnParticles(['◆','✦','○']);
    checkAchievements();
    closeOverlay();
    startNewRound();
    return;
  }
  let u=G.upgrades.find(u=>u.id===id);if(!u||u.owned)return;
  if(G.chips<u.cost){log('Not enough chips!','bad');return;}
  G.chips-=u.cost;u.owned=true;G.shopPurchasedThisVisit=true;
  let pd5=loadPD();if(!pd5.codexUpgrades.includes(id)){pd5.codexUpgrades.push(id);savePD(pd5);}
  log(`Bought: ${u.icon} ${u.name}!`,'chaos');spawnParticles(['★','◆']);
  closeOverlay();
  startNewRound();
}

// ════════════════════════════════════════════════════════════
function showAchievementsOverlay(){
  let pd6=loadPD();
  let total=ACHIEVEMENTS.length;
  let unlocked=Object.keys(pd6.achievements||{}).length;
  let html=`<div class="achievements-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div style="font-family:\'Bebas Neue\',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);">🏆 ACHIEVEMENTS</div>
      <button class="btn btn-menu" onclick="closeOverlay()">CLOSE</button>
    </div>
    <div style="font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:12px;">${unlocked} / ${total} unlocked · Level ${pd6.xpLevel||1} — ${getXPTitle(pd6.xpLevel||1)} · ${(pd6.xpTotal||0).toLocaleString()} XP</div>
    ${ACHIEVEMENTS.map(a=>{
      let ach=pd6.achievements?.[a.id];
      let isUnlocked=!!ach;
      // All locked achievements show as grey ?, secrets get special marker
      let cls='achievement'+(isUnlocked?' unlocked':'')+(a.secret&&!isUnlocked?' secret':'');
      let icon=isUnlocked?a.icon:'❓';
      let name=isUnlocked?a.name:(a.secret?'⚠ SECRET':'???');
      let desc=isUnlocked?a.desc:(a.secret?(a.hint||'A secret achievement. Try something unusual...'):'Complete something to discover this.');
      let secretBadge=a.secret&&!isUnlocked?'<div style="font-size:8px;color:#ff88aa;letter-spacing:1px;margin-top:2px;">🔒 SECRET ACHIEVEMENT</div>':'';
      let unlockedBadge=isUnlocked?`<div class="ach-badge">UNLOCKED ${new Date(ach.unlockedAt).toLocaleDateString()}</div>`:'';
      return`<div class="${cls}"><div class="ach-icon">${icon}</div><div><div class="ach-name">${name}</div><div class="ach-desc">${desc}</div>${secretBadge}${unlockedBadge}</div></div>`;
    }).join('')}
  </div>`;
  showOverlay(html);
}

// ════════════════════════════════════════════════════════════
// CODEX OVERLAY
// ════════════════════════════════════════════════════════════
function showCodexOverlay(tab, subTab){
  tab = tab || 'poker';
  subTab = subTab || 'mods';
  let pd7 = loadPD();

  // Helper: render an icon safely
  function dIcon(iconName, size) {
    if (!iconName) return '<span style="font-size:'+(size||16)+'px;">❓</span>';
    if (ICONS[iconName]) return icon(iconName, size||18);
    // emoji or unknown key
    return '<span style="font-size:'+(size||16)+'px;">' + iconName + '</span>';
  }

  // Per-game data sets
  const GAME_DATA = {
    poker: {
      label: "CHAOS HOLD'EM", color: '#c9963a',
      mods:     CHAOS_MODS,
      upgrades: ALL_UPGRADES,
      curses:   null,
    },
    blackjack: {
      label: 'BLACKJACK', color: '#4fc3f7',
      mods:     BJ_MODS.concat(BJ_SECRET_MODS || []),
      upgrades: CASINO_UPGRADES_SHARED.filter(function(u){return !u.bj_only===false||u.bj_only;}),
      curses:   CASINO_CURSES_SHARED,
    },
    slots: {
      label: 'SLOTS', color: '#ab47bc',
      mods:     SLOT_MODS,
      upgrades: CASINO_UPGRADES_SHARED,
      curses:   CASINO_CURSES_SHARED,
    },
    crash: {
      label: 'CRASH', color: '#ef5350',
      mods:     CASINO_MODS_SHARED,
      upgrades: CASINO_UPGRADES_SHARED,
      curses:   CASINO_CURSES_SHARED,
    },
    roulette: {
      label: 'ROULETTE', color: '#27ae60',
      mods:     CASINO_MODS_SHARED,
      upgrades: CASINO_UPGRADES_SHARED,
      curses:   CASINO_CURSES_SHARED,
    },
  };

  let gd = GAME_DATA[tab] || GAME_DATA.poker;
  let seenMods = pd7.codexMods || [];
  let seenUpgrades = pd7.codexUpgrades || [];

  // Build content based on subTab
  let content = '';
  if (subTab === 'mods') {
    let items = gd.mods || [];
    content = '<div class="codex-grid">'
      + items.map(function(m) {
          let seen = seenMods.includes(m.id) || tab !== 'poker';
          return '<div class="codex-entry' + (seen ? '' : ' undiscovered') + '">'
            + '<div class="codex-entry-icon">' + (seen ? dIcon(m.icon, 18) : '❓') + '</div>'
            + '<div class="codex-entry-name">' + (seen ? m.name : '???') + '</div>'
            + '<div class="codex-entry-desc">' + (seen ? (m.desc || '') : 'Discover in a run.') + '</div>'
            + '</div>';
        }).join('')
      + '</div>';
  } else if (subTab === 'upgrades') {
    let items = gd.upgrades || [];
    content = '<div class="codex-grid">'
      + items.map(function(u) {
          let seen = seenUpgrades.includes(u.id) || tab !== 'poker';
          let tierCol = {common:'rgba(255,255,255,0.3)',uncommon:'#4fc3f7',rare:'#ab47bc',epic:'#ff9800'};
          return '<div class="codex-entry' + (seen ? '' : ' undiscovered') + '" style="border-color:' + (tierCol[u.tier||'common']) + '33;">'
            + '<div class="codex-entry-icon">' + (seen ? dIcon(u.icon, 18) : '❓') + '</div>'
            + '<div class="codex-entry-name" style="color:' + (tierCol[u.tier||'common']) + ';">' + (seen ? u.name : '???') + '</div>'
            + '<div class="codex-entry-desc">' + (seen ? (u.desc || '') : 'Buy to discover.') + '</div>'
            + (seen && u.cost ? '<div style="font-size:8px;color:var(--gold);margin-top:3px;">$' + u.cost + '</div>' : '')
            + '</div>';
        }).join('')
      + '</div>';
  } else if (subTab === 'curses') {
    let items = gd.curses || [];
    content = items.length === 0
      ? '<div style="text-align:center;padding:30px;color:var(--muted);">No curses for this mode yet.</div>'
      : '<div class="codex-grid">'
        + items.map(function(c) {
            return '<div class="codex-entry" style="border-color:rgba(200,0,200,0.3);">'
              + '<div class="codex-entry-icon">' + dIcon(c.icon || 'skull', 18) + '</div>'
              + '<div class="codex-entry-name" style="color:#ff88ff;">' + c.name + '</div>'
              + '<div class="codex-entry-desc">' + (c.desc || '') + '</div>'
              + '<div style="font-size:8px;color:#ff88ff;margin-top:3px;">+' + c.curse + ' CURSE · FREE</div>'
              + '</div>';
          }).join('')
        + '</div>';
  } else if (subTab === 'unlocks') {
    // All unlockables
    let sections = [
      ['DECKS', Object.values(UNLOCKABLES.decks || {})],
      ['TABLES', Object.values(UNLOCKABLES.tables || {})],
      ['BACKGROUNDS', Object.values(UNLOCKABLES.backgrounds || {})],
      ['CARD BACKS', Object.values(UNLOCKABLES.cardBacks || {})],
    ];
    content = sections.map(function(sec) {
      let items = sec[1];
      if (!items || !items.length) return '';
      return '<div style="margin-bottom:14px;">'
        + '<div style="font-size:8px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;">' + sec[0] + '</div>'
        + '<div class="codex-grid">'
        + items.map(function(it) {
            let owned = it.unlocked || ((pd7.ownedCosmetics || {})[it.id]);
            let achName = it.unlockAch ? ((ACHIEVEMENTS.find(function(a){return a.id===it.unlockAch;})||{}).name || it.unlockAch) : null;
            return '<div class="codex-entry' + (owned ? '' : ' undiscovered') + '">'
              + '<div class="codex-entry-icon">' + (owned ? '✅' : '🔒') + '</div>'
              + '<div class="codex-entry-name">' + it.name + '</div>'
              + '<div class="codex-entry-desc">' + (it.desc || '') + (achName && !owned ? '<br><span style="color:var(--gold);font-size:8px;">Unlock: ' + achName + '</span>' : '') + '</div>'
              + '</div>';
          }).join('')
        + '</div></div>';
    }).join('');
  }

  // Tab bar — game modes
  let gameTabs = ['poker','blackjack','slots','crash','roulette'].map(function(g) {
    let gInfo = GAME_DATA[g];
    return '<div class="codex-tab' + (g === tab ? ' active' : '') + '" onclick="showCodexOverlay(\'' + g + '\',\'' + subTab + '\')" style="' + (g === tab ? 'color:' + gInfo.color + ';border-color:' + gInfo.color + ';' : '') + '">' + gInfo.label + '</div>';
  }).join('');

  // SubTab bar
  let hasCurses = gd.curses && gd.curses.length > 0;
  let subTabs = [
    ['mods', 'MODIFIERS'],
    ['upgrades', 'UPGRADES'],
    hasCurses ? ['curses', 'CURSES'] : null,
    ['unlocks', 'UNLOCKABLES'],
  ].filter(Boolean).map(function(st) {
    return '<div class="codex-tab' + (st[0] === subTab ? ' active' : '') + '" onclick="showCodexOverlay(\'' + tab + '\',\'' + st[0] + '\')" style="font-size:9px;">' + st[1] + '</div>';
  }).join('');

  let html = '<div class="codex-panel">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
    + '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);">📖 DOSSIER</div>'
    + '<button class="btn btn-menu" onclick="closeOverlay()">CLOSE</button>'
    + '</div>'
    // Game mode tabs
    + '<div class="codex-tabs" style="margin-bottom:6px;">' + gameTabs + '</div>'
    // Sub tabs
    + '<div class="codex-tabs" style="margin-bottom:12px;">' + subTabs + '</div>'
    // Content
    + content
    + '</div>';
  showOverlay(html);
}

      <div style="font-family:\'Bebas Neue\',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);">📋 HOW TO PLAY</div>

    </div>

    <div class="guide-section">
      <div class="guide-h">CHAOS CASINO — GAME MODES</div>
      <div class="guide-p">The Casino Hub is the home screen. All five game modes live here, each with its own roguelike loop: modifiers, upgrades, a curse shop, and bosses. Non-card games (Slots, Crash, Roulette) use a <b>profit target system</b> instead of lives — hit the target before you run out of pulls/spins/rounds or you bust. Blackjack uses a 3-strike life system.</div>

      <div class="guide-p"><b>CHAOS SLOTS</b> — 5 reels, themed machine per level. Hit a profit target within a pull limit. Cursed reels are assigned before your spin but revealed after — you'll see them glow purple when they don't pay. Boss machines every 3rd level add a permanent modifier for that machine. Shop opens when you clear a machine's profit target.</div>
      <div class="guide-p"><b>CHAOS CRASH</b> — Bet, launch, cash out before the rocket crashes. The multiplier climbs exponentially. Curse windows block your cashout button at random — you cannot predict when. All player runs are broadcast in the NYSE ticker at the top of the screen. Shop opens when you hit your profit target for the run.</div>
      <div class="guide-p"><b>CHAOS ROULETTE</b> — Bet on numbers, colors, odd/even, ranges. When you commit and the wheel spins, cursed numbers are chosen — revealed in purple after the ball lands. Hit the profit target within the spin limit or bust. Spin limit shrinks each time you hit a target. Shop every time you clear a profit target.</div>
      <div class="guide-p"><b>SHARED SYSTEMS</b> — Every game uses the same upgrade shop structure (26 items, tier-weighted), curse shop, and active item system. Shop timing is enforced per-game — you cannot open it mid-round. Cross-game achievements require playing all five modes.</div>
    </div>
    <div class="guide-section">
      <div class="guide-h">LIVES SYSTEM</div>
      <div class="guide-p">You start each run with <b>3 lives ❤❤❤</b>. Losing a hand costs you a life. You <b>cannot advance to the next level until you win a hand</b>. Lose all 3 lives — run over. <b>Winning a hand restores 1 life</b>.</div>

    <div class="guide-section">
      <div class="guide-h">ROUNDS & SHOP</div>
      ${[['Every 3 rounds','A shop appears. Pick ONE upgrade (or skip). Each shop also has a Curse Shop option.'],['Every 10 hands','A Boss Fight is triggered. Win for a big reward. Lose and the run continues (but you lost).'],['Blinds increase','Every 3 rounds the blinds go up. The game gets harder the longer you survive.']].map(([t,d])=>`<div class="guide-rule"><div class="guide-rule-icon">→</div><div class="guide-rule-text"><b>${t}:</b> ${d}</div></div>`).join('')}
    </div>
    <div class="guide-section">
      <div class="guide-h">CURSE</div>
      <div class="guide-p">The <b>Curse Shop</b> offers powerful items for free — but they add <b>curse</b>, a hidden counter. The higher your curse, the more likely a <b>Curse Card</b> appears in your hand. Curse cards are worthless — they don't count at showdown. <b>Curse is permanent and you can't see your total.</b></div>
    </div>

function sanitizeLastSeen(label){
  if(!label || label === 'never' || label === '0') return 'never';
  // Reject anything with huge numbers (epoch artifacts like "20633d ago")
  let match = label.match(/(\d+)d ago/);
  if(match && parseInt(match[1]) > 365) return 'never';
  return label;
}

  let scale = parseFloat(val) || 1.0;

  let lbl=document.getElementById('ui-scale-label');
  if(lbl) lbl.textContent = Math.round(scale*100)+'%';

function goToMainMenu(){

  if (_mpActive || _wsRoom) {
    _mpActive = false;
    try { wsSend({type:'leave_room'}); } catch(e) {}
    setTimeout(function(){
      if(_ws){try{_ws.onclose=null;_ws.onerror=null;_ws.onmessage=null;_ws.close();}catch(e){}  _ws=null;}
      _wsRoom=null;_mpState=null;_myHole=[];
    }, 200);
  }
  stopPlayTimeTracking();
  stopRunPresence();
  _ngSessionStart = null;
  removeRunLogPanel();
  // Left panel content is now inside the 3-panel main menu — no floating sidebar needed
  setTimeout(checkCrewHighScores, 3000);

    let btn = document.getElementById('whats-new-btn');
    if(btn) btn.style.opacity = seen ? '0.45' : '1';
  }, 50);
  if(!window._updateDismissed)setTimeout(()=>checkForUpdates(true),2000);

  let pd13=loadPD();

// ONLINE LOBBY SCAFFOLD
// Room codes, 4-player lobby, ready states.
// WS server not live yet — UI and state machine ready.
// ════════════════════════════════════════════════════════════
const LOBBY_STATE={IDLE:'idle',HOSTING:'hosting',JOINING:'joining',IN_LOBBY:'in_lobby'};
let lobbyData={state:LOBBY_STATE.IDLE,roomCode:null,players:[],isHost:false};

function generateRoomCode(){
  let chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',code='';
  for(let i=0;i<6;i++)code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}
function hostLobby(){
  let ap=getActiveProfile();
  let name=ap?ap.name:(loadPD().playerName||'Player');
  lobbyData={state:LOBBY_STATE.HOSTING,roomCode:generateRoomCode(),isHost:true,
    players:[{name,ready:true,isHost:true,slot:0}]};
  showLobbyOverlay();
}
function joinRoom(){
  let ap=getActiveProfile();
  let name=ap?ap.name:(loadPD().playerName||'Player');
  let code=(document.getElementById('room-code-input')?.value||'').trim().toUpperCase();
  if(code.length!==6){log('Enter a 6-letter room code','bad');return;}
  lobbyData={state:LOBBY_STATE.JOINING,roomCode:code,isHost:false,
    players:[{name,ready:false,isHost:false,slot:1}]};
  showLobbyOverlay();
}
function leaveLobby(){
  lobbyData={state:LOBBY_STATE.IDLE,roomCode:null,players:[],isHost:false};
  closeOverlay();
}
function toggleReady(){
  let me=lobbyData.players[0];if(me)me.ready=!me.ready;
  showLobbyOverlay();
}
function showLobbyOverlay(){
  let code=lobbyData.roomCode||'------';
  let isHost=lobbyData.isHost;
  let allReady=lobbyData.players.length>=2&&lobbyData.players.every(p=>p.ready);
  let slots='';
  for(let i=0;i<4;i++){
    let p=lobbyData.players.find(p=>p.slot===i);
    slots+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;'
      +'background:'+(p?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.3)')+';">'
      +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:13px;color:var(--muted);width:20px;">'+(i+1)+'</div>';
    if(p){
      slots+='<div style="flex:1;font-family:\'Bebas Neue\',sans-serif;font-size:16px;color:var(--text);">'+p.name
        +(p.isHost?' <span style="font-size:9px;color:var(--gold);">HOST</span>':'')+'</div>'
        +'<div style="font-size:11px;font-weight:700;color:'+(p.ready?'var(--green2)':'var(--muted)')+';">'+(p.ready?'READY':'NOT READY')+'</div>';
    }else{
      slots+='<div style="flex:1;font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:1px;">WAITING...</div>';
    }
    slots+='</div>';
  }
  showOverlay('<div class="pause-panel" style="max-width:500px;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">'
    +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gold);">'+(isHost?'YOUR LOBBY':'JOINING LOBBY')+'</div>'
    +'<button class="btn btn-fold" onclick="leaveLobby()" style="font-size:11px;padding:5px 12px;">LEAVE</button>'
    +'</div>'
    +'<div style="background:rgba(0,0,0,0.5);border:2px solid rgba(212,168,67,0.3);border-radius:10px;padding:14px;text-align:center;margin-bottom:16px;">'
    +'<div style="font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:6px;">ROOM CODE</div>'
    +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:clamp(32px,6vw,48px);letter-spacing:10px;color:var(--gold);">'+code+'</div>'
    +'<div style="font-size:9px;color:var(--muted);margin-top:4px;">Share this with your crew</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;">'+slots+'</div>'
    +'<div style="display:flex;gap:8px;">'
    +'<button class="btn '+(lobbyData.players[0]?.ready?'btn-fold':'btn-primary')+'" onclick="toggleReady()" style="flex:1;font-size:14px;padding:10px;">'+(lobbyData.players[0]?.ready?'UNREADY':'READY UP')+'</button>'
    +(isHost&&allReady
      ?'<button class="btn btn-primary" onclick="onlineLobbyStart()" style="flex:1;font-size:14px;padding:10px;">START &#8594;</button>'
      :'<button class="btn btn-menu" style="flex:1;font-size:14px;padding:10px;opacity:0.4;cursor:default;">WAITING...</button>')
    +'</div>'
    +'<div style="font-size:9px;color:rgba(255,255,255,0.15);text-align:center;margin-top:10px;">Online play coming soon — lobby preview</div>'
    +'</div>');
}

function onlineLobbyStart(){log("Online multiplayer coming soon","chaos");closeOverlay();}

// Matchup tally (stored on server + locally)
let _matchupTally = {};
function loadMatchupTally(){
  try{ _matchupTally=JSON.parse(localStorage.getItem('chaosMatchupTally')||'{}'); }catch(e){ _matchupTally={}; }
  return _matchupTally;
}
function saveMatchupTally(){ try{localStorage.setItem('chaosMatchupTally',JSON.stringify(_matchupTally));}catch(e){} }
function recordMatchResult(winnerId, loserId){
  let key=[winnerId,loserId].sort().join('_vs_');
  if(!_matchupTally[key]) _matchupTally[key]={p1:winnerId,p2:loserId,wins:{}};
  _matchupTally[key].wins[winnerId]=(_matchupTally[key].wins[winnerId]||0)+1;
  saveMatchupTally();
}
function getMatchupRecord(p1Id, p2Id){
  let key=[p1Id,p2Id].sort().join('_vs_');
  let m=_matchupTally[key];
  if(!m) return {p1wins:0,p2wins:0};
  return {p1wins:m.wins[p1Id]||0, p2wins:m.wins[p2Id]||0};
}

function calculateScore(){
  let chips=G.chips||0;
  let handsWon=G.wins||0;
  let rounds=G.round||1;
  let bossesKilled=G.bossesDefeated?G.bossesDefeated.length:0;
  let curse=G.totalCurse||0;
  // Base: chips are the foundation
  let base=Math.floor(chips*0.5);
  // Wins bonus
  let winBonus=handsWon*80;
  // Rounds bonus (diminishing)
  let roundBonus=Math.floor(rounds*50*Math.log(rounds+1));
  // Boss bonus (big deal)
  let bossBonus=bossesKilled*1500;
  // Curse multiplier: curse makes you braver, score reflects that
  // High curse = higher multiplier (rewarding risky play)
  let curseMult=1+Math.min(1.5,curse/60);
  let hardcoreMult=G.hardcore?(hasUpgrade('hardcoreBonus')?5:3):1;
  let raw=base+winBonus+roundBonus+bossBonus;
  return{
    total:Math.floor(raw*curseMult*hardcoreMult),
    hardcoreMult,
    base,winBonus,roundBonus,bossBonus,
    curseMult:curseMult.toFixed(2),
    raw
  };
}

// CASH OUT — available every 15 rounds
// ════════════════════════════════════════════════════════════
function canCashOut(){
  return G.round>0&&G.round%15===0&&!G.isBossFight;
}
function showCashOutScreen(){
  let score=calculateScore();
  let pd=loadPD();
  let owned=G.upgrades.filter(u=>u.owned);
  // Save final stats
  let s=loadStats();
  s.totalRuns++;s.totalWins+=G.wins;s.totalRounds+=G.round;
  s.bestRound=Math.max(s.bestRound,G.round);s.bestStack=Math.max(s.bestStack,G.highScore);
  for(let id of(G.runModsSeen||[]))s.modsSeen[id]=(s.modsSeen[id]||0)+1;
  if(!s.topRuns)s.topRuns=[];
  s.topRuns.push({round:G.round,wins:G.wins,peak:G.highScore,score:score.total,date:new Date().toLocaleDateString(),player:pd.playerName||'Anonymous'});
  s.topRuns.sort((a,b)=>(b.score||0)-(a.score||0)||(b.peak-a.peak));
  s.topRuns=s.topRuns.slice(0,5);
  saveStats(s);
  unlockAchievement('cash_out');
  if(score.total>=10000)unlockAchievement('score_10k');
  clearRun();
  // N Games Network — win achievements + run progress
  (function(){
    let pd_ng = loadPD();
    let totalRuns = ((pd_ng.stats&&pd_ng.stats.totalRuns)||0);
    let wentBroke = G.highScore === 0;
    try { NGame.unlockAchievement('ch_first_win'); } catch(e) {}
    try { if(G.hardcore) NGame.unlockAchievement('ch_hardcore'); } catch(e) {}
    try { if(!wentBroke) NGame.unlockAchievement('ch_untouchable'); } catch(e) {}
    try { NGame.updateProgress('ch_big_stack',   G.highScore); } catch(e) {}
    try { NGame.updateProgress('ch_century',     G.round); } catch(e) {}
    try { NGame.updateProgress('ch_high_roller', score.total); } catch(e) {}
    try { NGame.updateProgress('ch_survivor',    totalRuns); } catch(e) {}
    try { NGame.updateProgress('ch_dedicated',   totalRuns); } catch(e) {}
  })();

  // Most common mod this run
  let modCounts={};

document.addEventListener('keydown',e=>{
  // Never fire radio/game keys when user is typing in an input
  let tag = (e.target.tagName||'').toLowerCase();
  let isTyping = tag==='input'||tag==='textarea'||e.target.isContentEditable;

  // Ctrl+Shift+A = Admin panel
  if(e.ctrlKey && e.shiftKey && (e.key==='A'||e.key==='a')){
    e.preventDefault();
    showAdminPanel();
    return;
  }
  // Ctrl+Shift+X = Emergency exit (no confirmation)
  if(e.ctrlKey && e.shiftKey && (e.key==='X'||e.key==='x')){
    e.preventDefault();
    confirmExit();
    return;
  }
  // Ctrl+Q = Exit with confirmation
  if(e.ctrlKey && (e.key==='q'||e.key==='Q') && !e.shiftKey){
    e.preventDefault();
    exitGame();
    return;
  }
  let pd14=loadPD();if(!pd14.settings?.keyboardControls)return;
  let you=G.players?.[G.youIdx];
  let isYourTurn=you&&!you.folded&&!you.allIn&&G.phase==='betting'&&G.players[G.toAct]?.isYou;
  switch(e.key){
    case 'Escape':
      if(document.getElementById('overlay-root')?.innerHTML)closeOverlay();
      else if(G.phase==='betting'||G.phase==='discard')showPauseMenu();
      break;
    case 'f':case 'F':if(isYourTurn)playerAction('fold');break;
    case 'c':case 'C':if(isYourTurn){let ca=Math.max(0,G.currentBet-you.bet);playerAction(ca<=0?'check':'call');}break;
    case 'r':case 'R':if(isYourTurn)openRaise();break;
    case 'a':case 'A':if(isYourTurn&&!e.ctrlKey&&!e.shiftKey){let btn=document.getElementById('allin-btn');if(btn)confirmAllIn(btn,G.players[G.youIdx]?.chips||0);}break;
    case 'm':case 'M':if(!isTyping)toggleMusic();break;
    case 'ArrowLeft':if(!isTyping)prevTrack();break;
    case 'ArrowRight':if(!isTyping)nextTrack();break;
  }
});
